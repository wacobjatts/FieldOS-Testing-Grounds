<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>FieldOS / Kinetic - Industrial Glass Refinement</title>
  <link rel="stylesheet" href="style.css?v=2">
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>

<div class="app-shell">
  <div class="workspace-shell">
    <div class="access-trigger trigger-left" onclick="toggleCurtain('leftCurtain')">
      <div class="access-orb"></div>
    </div>
    <div class="access-trigger trigger-right" onclick="toggleCurtain('rightCurtain')">
      <div class="access-orb"></div>
    </div>

    <aside class="curtain left-curtain is-collapsed" id="leftCurtain"></aside>

    <main class="center-workspace">
      <section class="chart-box" id="chartContainer"></section>

      <div class="middle-stack">
        <section class="stack-card" id="card-asymmetry">
          <div class="card-visual-area">
            <div class="hud-meta hud-top-left"><span class="hud-title">Asymmetry Field</span></div>
            <div class="hud-meta hud-top-right">
              <span class="hud-category">Force</span>
              <div class="glyph" onclick="toggleMode(this, 'menu')">⧉</div>
              <div class="glyph" onclick="toggleMode(this, 'expand')">▿</div>
            </div>
            
            <div class="slot-menu-surface">
              <div class="menu-option">Replace Instrument</div>
              <div class="menu-option">Add Instrument Below</div>
            </div>

            <canvas id="canvas-asymmetry" class="field-canvas"></canvas>
            
            <div class="hud-meta hud-bottom-left">
              <div class="readout-item"><span class="readout-label">BIAS</span><span>0.419</span></div>
              <div class="readout-item"><span class="readout-label">EFFORT</span><span>0.177</span></div>
            </div>
          </div>
        </section>

        <section class="stack-card" id="card-entropy">
          <div class="card-visual-area">
            <div class="hud-meta hud-top-left"><span class="hud-title">Entropy Phase</span></div>
            <div class="hud-meta hud-top-right">
              <span class="hud-category">Env</span>
              <div class="glyph" onclick="toggleMode(this, 'menu')">⧉</div>
              <div class="glyph" onclick="toggleMode(this, 'expand')">▿</div>
            </div>

            <div class="slot-menu-surface">
              <div class="menu-option">Replace Instrument</div>
              <div class="menu-option">Add Instrument Below</div>
            </div>

            <canvas id="canvas-entropy" class="field-canvas"></canvas>
            
            <div class="hud-meta hud-bottom-left">
              <div class="readout-item"><span class="readout-label">DISORDER</span><span>0.884</span></div>
              <div class="readout-item"><span class="readout-label">STABILITY</span><span>0.116</span></div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <aside class="curtain right-curtain is-collapsed" id="rightCurtain"></aside>
  </div>

  <footer class="bottom-menu-wrap">
    <button class="menu-item">Vol</button>
    <button class="menu-item">Chrt</button>
    <button class="menu-item">Inst</button>
    <button class="menu-item">Book</button>
    <button class="menu-item">Sig</button>
    <button class="menu-item">News</button>
    <button class="menu-item">▾</button>
  </footer>
</div>

<script>
  function toggleCurtain(id) { document.getElementById(id).classList.toggle('is-collapsed'); }

  function toggleMode(el, mode) {
    const card = el.closest('.stack-card');
    
    if (mode === 'expand') {
      const isExpanded = card.classList.contains('is-expanded');
      document.querySelectorAll('.stack-card').forEach(c => c.classList.remove('is-expanded'));
      if (!isExpanded) card.classList.add('is-expanded');
    } 
    else if (mode === 'menu') {
      // UPDATED: MULTI-MENU LOGIC
      card.classList.toggle('mode-menu');
    }
  }

  const chart = LightweightCharts.createChart(document.getElementById('chartContainer'), {
    layout: { background: { color: '#000' }, textColor: '#444', fontFamily: 'JetBrains Mono' },
    grid: { vertLines: { color: '#040404' }, horzLines: { color: '#040404' } },
    timeScale: { borderColor: '#000' },
    crosshair: { vertLine: { color: '#00e5ff11' }, horzLine: { color: '#00e5ff11' } }
  });
  const candleSeries = chart.addCandlestickSeries({ upColor: '#00e5ff', downColor: '#080808', borderVisible: false, wickUpColor: '#00e5ff', wickDownColor: '#080808' });
  const mockData = Array.from({length: 100}, (_, i) => ({ time: new Date(2026, 0, i).toISOString().split('T')[0], open: 100+i, high: 105+i, low: 98+i, close: 103+i }));
  candleSeries.setData(mockData);

  function paint(id, color) {
    const canvas = document.getElementById(id);
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    if (canvas.width !== rect.width * dpr) { canvas.width = rect.width * dpr; canvas.height = rect.height * dpr; ctx.scale(dpr, dpr); }
    ctx.clearRect(0,0,rect.width, rect.height);
    ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 1; ctx.globalAlpha = 0.2;
    ctx.moveTo(0, rect.height * 0.7);
    for(let x=0; x<rect.width; x+=12) ctx.lineTo(x, rect.height * 0.7 - Math.random() * (rect.height * 0.35));
    ctx.stroke();
  }

  function loop() { paint('canvas-asymmetry', '#00e5ff'); paint('canvas-entropy', '#00e5ff'); requestAnimationFrame(loop); }
  loop();
</script>

</body>
</html>
