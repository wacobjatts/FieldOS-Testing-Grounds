<body>

<div class="app-shell">
  <div class="workspace-shell">
    <div class="access-trigger trigger-left" onclick="toggleCurtain('leftCurtain')"><div class="access-orb"></div></div>
    <div class="access-trigger trigger-right" onclick="toggleCurtain('rightCurtain')"><div class="access-orb"></div></div>
    
    <aside class="curtain left-curtain is-collapsed" id="leftCurtain"></aside>

    <main class="center-workspace" id="mainWorkspace">
      <section class="chart-box" id="chartContainer">
          <div class="fs-toggle" id="fsBtn" onclick="toggleFullscreen()">[ FS ]</div>
      </section>

      <div class="middle-stack" id="stack">
        <script>
            let cardCounter = 0;
            const instrumentData = {
                Force: { desc: 'directional imbalance and push', items: ['Asymmetry Field', 'Momentum Vector', 'Participation Flux'] },
                Inertia: { desc: 'resistance and mass behavior', items: ['Inertia Field', 'Mass Classification', 'Inertia Decay'] },
                Environment: { desc: 'entropy, stability, conditions', items: ['Entropy Phase', 'Stability Index', 'Distortion Field'] },
                Resistance: { desc: 'friction, density, obstruction', items: ['Cost to Move', 'Liquidity Density', 'Slippage Friction'] },
                Interpretation: { desc: 'truth, confidence, clarity', items: ['Truth Field', 'Confidence Field', 'Precision Field'] },
                Decision: { desc: 'alignment, continuation, reversal pressure', items: ['Alignment Score', 'Continuation Pressure', 'Reversal Pressure'] }
            };

            function createCard(title, category) {
                cardCounter++;
                const id = cardCounter;
                const card = document.createElement('section');
                card.className = 'stack-card';
                card.id = `card-${id}`;
                card.dataset.actionMode = 'replace';
                
                card.innerHTML = `
                    <div class="card-visual-area">
                        <div class="hud-meta hud-top-left"><span class="hud-title">${title}</span></div>
                        <div class="hud-top-right hud-meta">
                            <span class="hud-category">${category}</span>
                            <div class="glyph" onclick="toggleMenu(${id})">⧉</div>
                            <div class="glyph" onclick="toggleExpand(${id})">▿</div>
                        </div>
                        <canvas id="canvas-${id}" class="field-canvas"></canvas>
                        <div class="hud-bottom-left hud-meta">
                            <div class="readout-item"><span class="readout-label">SIG</span><span>0.${Math.floor(Math.random()*900)+100}</span></div>
                            <div class="readout-item"><span class="readout-label">VAL</span><span>0.${Math.floor(Math.random()*900)+100}</span></div>
                        </div>
                    </div>
                    <div class="card-menu-overlay" id="menu-${id}">
                        <div class="menu-header">
                            <div class="header-left" id="head-label-${id}">Instrument Menu</div>
                            <div class="close-btn" onclick="toggleMenu(${id})">X</div>
                        </div>
                        <div class="action-row" id="action-row-${id}">
                            <button class="action-btn is-active" id="btn-replace-${id}" onclick="setActionMode(${id}, 'replace')">Replace</button>
                            <button class="action-btn" id="btn-add-${id}" onclick="setActionMode(${id}, 'add')">Add Below</button>
                        </div>
                        <div class="menu-body" id="menu-body-${id}"></div>
                    </div>
                `;
                return card;
            }

            function initStack() {
                const stack = document.getElementById('stack');
                stack.appendChild(createCard('Asymmetry Field', 'Force'));
                stack.appendChild(createCard('Entropy Phase', 'Environment'));
            }
            initStack();
        </script>
      </div>
    </main>
    <aside class="curtain right-curtain is-collapsed" id="rightCurtain"></aside>
  </div>
  <footer class="bottom-menu-wrap">
    <button class="menu-item">Order</button><button class="menu-item">Flow</button><button class="menu-item">Depth</button>
    <button class="menu-item">Histo</button><button class="menu-item">Alert</button><button class="menu-item">Log</button>
  </footer>
</div>

<script>
  function toggleFullscreen() {
    const isFS = document.body.classList.contains('chart-fullscreen');
    const btn = document.getElementById('fsBtn');
    if (!isFS) { document.body.classList.add('chart-fullscreen'); btn.innerText = '[ EXIT ]'; } 
    else { document.body.classList.remove('chart-fullscreen'); btn.innerText = '[ FS ]'; }
    requestAnimationFrame(() => {
        chart.resize(document.getElementById('chartContainer').clientWidth, document.getElementById('chartContainer').clientHeight);
        chart.timeScale().fitContent();
    });
  }

  function toggleCurtain(id) { document.getElementById(id).classList.toggle('is-collapsed'); }

  function toggleExpand(id) {
    const card = document.getElementById(`card-${id}`);
    const isExpanded = card.classList.contains('is-expanded');
    card.classList.remove('mode-menu');
    document.querySelectorAll('.stack-card').forEach(c => c.classList.remove('is-expanded'));
    if (!isExpanded) card.classList.add('is-expanded');
  }

  function toggleMenu(id) {
    const card = document.getElementById(`card-${id}`);
    if (!card.classList.contains('mode-menu')) {
        card.dataset.actionMode = 'replace';
        renderGrid(id);
        card.classList.add('mode-menu');
        card.classList.remove('is-expanded');
    } else {
        card.classList.remove('mode-menu');
    }
  }

  function setActionMode(id, mode) {
    const card = document.getElementById(`card-${id}`);
    card.dataset.actionMode = mode;
    document.getElementById(`btn-replace-${id}`).classList.toggle('is-active', mode === 'replace');
    document.getElementById(`btn-add-${id}`).classList.toggle('is-active', mode === 'add');
  }

  function renderGrid(id) {
    const body = document.getElementById(`menu-body-${id}`);
    const head = document.getElementById(`head-label-${id}`);
    const row = document.getElementById(`action-row-${id}`);
    head.innerHTML = "Instrument Menu";
    row.style.display = "grid";
    
    let html = '<div class="category-grid">';
    for (let cat in instrumentData) {
        html += `<div class="cat-box" onclick="renderInstruments(${id}, '${cat}')">
                    <div class="cat-title">${cat}</div>
                    <div class="cat-desc">${instrumentData[cat].desc}</div>
                </div>`;
    }
    body.innerHTML = html + '</div>';
  }

  function renderInstruments(id, cat) {
    const body = document.getElementById(`menu-body-${id}`);
    const head = document.getElementById(`head-label-${id}`);
    const row = document.getElementById(`action-row-${id}`);
    head.innerHTML = `<span class="back-btn" onclick="renderGrid(${id})">←</span> ${cat}`;
    row.style.display = "none";
    
    let html = '<div class="instrument-list">';
    instrumentData[cat].items.forEach(inst => {
        html += `<div class="inst-row" onclick="selectInstrument(${id}, '${inst}', '${cat}')">${inst}</div>`;
    });
    body.innerHTML = html + '</div>';
  }

  function selectInstrument(id, inst, cat) {
    const card = document.getElementById(`card-${id}`);
    const mode = card.dataset.actionMode;
    
    if (mode === 'replace') {
        card.querySelector('.hud-title').innerText = inst;
        card.querySelector('.hud-category').innerText = cat;
    } else {
        const newCard = createCard(inst, cat);
        card.after(newCard);
    }
    card.classList.remove('mode-menu');
  }

  // CHART SETUP
  const chart = LightweightCharts.createChart(document.getElementById('chartContainer'), {
    layout: { background: { color: '#000' }, textColor: '#444' },
    grid: { vertLines: { color: '#050505' }, horzLines: { color: '#050505' } },
    timeScale: { borderColor: '#000' },
  });
  const candleSeries = chart.addCandlestickSeries({ upColor: '#00e5ff', downColor: '#000', borderVisible: true, borderUpColor: '#00e5ff', borderDownColor: '#00e5ff' });
  candleSeries.setData(Array.from({length: 120}, (_, i) => ({ time: 1640995200 + i * 86400, open: 100+i, high: 105+i, low: 98+i, close: 103+i })));

  // CANVAS ANIMATION
  function paint() {
    document.querySelectorAll('.field-canvas').forEach(canvas => {
        const ctx = canvas.getContext('2d');
        const rect = canvas.getBoundingClientRect();
        if (canvas.width !== rect.width) { canvas.width = rect.width; canvas.height = rect.height; }
        ctx.clearRect(0,0,rect.width, rect.height);
        ctx.strokeStyle = '#00e5ff'; ctx.lineWidth = 0.8;
        const time = Date.now() * 0.0014;
        ctx.globalAlpha = 0.14 + Math.sin(time * 0.4) * 0.05;
        ctx.beginPath();
        for(let i = 0; i < 15; i++) {
            let y = (rect.height * 0.5) + Math.sin(time + i * 0.4) * (18 + i);
            ctx.moveTo(0, y); ctx.bezierCurveTo(rect.width * 0.35, y - 25, rect.width * 0.65, y + 25, rect.width, y);
        }
        ctx.stroke();
    });
    requestAnimationFrame(paint);
  }
  paint();

  window.addEventListener('resize', () => chart.resize(document.getElementById('chartContainer').clientWidth, document.getElementById('chartContainer').clientHeight));
</script>
</body>
</html>
