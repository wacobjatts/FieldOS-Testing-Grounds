<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FIELD-OS // PRECISION TERMINAL</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="terminal">
        <header class="top-bar">
            <div class="brand">FIELD-OS // KINETIC</div>
            <div class="stream-info">FEED: BTC-USD // LATENCY: <span id="ms-ping">12ms</span> // STATUS: ACTIVE</div>
        </header>
        
        <div class="main-layout">
            <aside class="sidebar">
                <div class="control-group">
                    <label>INSTRUMENT SELECT</label>
                    <select id="instrument-select">
                        <option value="absorption">ABSORPTION PRECISION</option>
                        <option value="kinetic">KINETIC MOMENTUM</option>
                        <option value="liquidity">LIQUIDITY DENSITY</option>
                    </select>
                </div>
                <div class="formula-block">
                    <label>ACTIVE LOGIC</label>
                    <pre id="code-display"><code></code></pre>
                </div>
                <div class="stats-stack">
                    <div class="stat">
                        <label>PRECISION %</label>
                        <div id="stat-precision" class="val-large">0.0%</div>
                    </div>
                    <div class="stat">
                        <label>DIVERGENCE DELTA</label>
                        <div id="stat-divergence" class="val-large">0.00</div>
                    </div>
                </div>
            </aside>

            <main class="chart-stage">
                <div class="chart-wrapper">
                    <canvas id="dualChart"></canvas>
                </div>
            </main>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
