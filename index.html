<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FieldOS Shell</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000000;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      overflow: hidden;
      color: #d9d9d9;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: 1fr 64px;
      gap: 12px;
      padding: 12px 12px 0;
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 12px;
      align-items: stretch;
    }

    /* LEFT CURTAIN */
    .left-panel {
      width: 240px;
      min-width: 240px;
      transition: width 0.25s ease, min-width 0.25s ease;
      overflow: hidden;
    }

    .left-panel.collapsed {
      width: 20px;
      min-width: 20px;
    }

    .left-shell {
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 20px;
    }

    .left-panel.collapsed .left-shell {
      grid-template-columns: 0 20px;
    }

    .left-content {
      min-width: 0;
      overflow: hidden;
      border: 1px solid #3a3a3a;
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 12px;
    }

    .left-panel.collapsed .left-content {
      border: 0;
      padding: 0;
    }

    .curtain-handle {
      border: 1px solid #3a3a3a;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      font-size: 14px;
    }

    .left-panel.collapsed .curtain-handle {
      border: 1px solid #3a3a3a;
    }

    /* CENTER */
    .center {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(360px, 52vh) 56px auto;
      gap: 12px;
    }

    .chart-wrap {
      min-width: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .chart-box {
      width: min(100%, 1100px);
      height: 100%;
      aspect-ratio: 1.18 / 1;
      border: 1px solid #3a3a3a;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 16px;
    }

    .volume-box {
      border: 1px solid #3a3a3a;
      display: flex;
      align-items: center;
      padding: 0 14px;
    }

    .instrument-panel {
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      border: 1px solid #3a3a3a;
      overflow: hidden;
      transition: grid-template-rows 0.25s ease;
    }

    .instrument-panel.collapsed {
      grid-template-rows: auto 0fr;
    }

    .instrument-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid #3a3a3a;
      gap: 12px;
    }

    .instrument-panel.collapsed .instrument-header {
      border-bottom: 0;
    }

    .instrument-title-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .instrument-toggle {
      border: 1px solid #3a3a3a;
      background: transparent;
      color: #d9d9d9;
      cursor: pointer;
      padding: 6px 10px;
      min-width: 44px;
    }

    .instrument-body {
      min-height: 0;
      overflow: hidden;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .instrument-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .instrument-card {
      min-height: 110px;
      border: 1px solid #3a3a3a;
      padding: 14px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
      text-align: left;
      background: transparent;
      color: #d9d9d9;
      cursor: pointer;
    }

    /* RIGHT CURTAIN */
    .right-panel {
      width: 320px;
      min-width: 320px;
      transition: width 0.25s ease, min-width 0.25s ease;
      overflow: hidden;
    }

    .right-panel.collapsed {
      width: 20px;
      min-width: 20px;
    }

    .right-shell {
      height: 100%;
      display: grid;
      grid-template-columns: 20px 1fr;
    }

    .right-panel.collapsed .right-shell {
      grid-template-columns: 20px 0;
    }

    .right-content {
      min-width: 0;
      border: 1px solid #3a3a3a;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }

    .right-panel.collapsed .right-content {
      border: 0;
    }

    .right-topbar {
      display: flex;
      justify-content: flex-end;
      padding: 12px;
      border-bottom: 1px solid #3a3a3a;
    }

    .module-add-icon {
      width: 32px;
      height: 32px;
      border: 1px solid #3a3a3a;
      background: transparent;
      color: #d9d9d9;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }

    .right-empty {
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      gap: 14px;
    }

    .add-module-btn {
      border: 1px solid #3a3a3a;
      background: transparent;
      color: #d9d9d9;
      cursor: pointer;
      padding: 10px 16px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    /* PAGE BAR */
    .page-bar {
      border: 1px solid #3a3a3a;
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 0;
      min-height: 0;
    }

    .page-tab {
      border: 0;
      border-right: 1px solid #3a3a3a;
      background: transparent;
      color: #d9d9d9;
      cursor: pointer;
      font-size: 16px;
    }

    .page-tab:last-child {
      border-right: 0;
    }

    .page-tab.active {
      font-weight: 700;
    }

    /* TEXT */
    h1, h2, p {
      margin: 0;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
    }

    .section-subtitle {
      font-size: 14px;
      line-height: 1.35;
      color: #b3b3b3;
    }

    .small-label {
      font-size: 15px;
    }

    .card-title {
      font-size: 18px;
      font-weight: 700;
    }

    .card-text {
      font-size: 14px;
      line-height: 1.35;
      color: #b3b3b3;
    }

    /* MOBILE */
    @media (max-width: 900px) {
      body {
        overflow: auto;
      }

      .app {
        height: auto;
        min-height: 100vh;
        grid-template-rows: auto 64px;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .left-panel,
      .right-panel {
        width: 100%;
        min-width: 0;
      }

      .left-panel.collapsed,
      .right-panel.collapsed {
        width: 100%;
        min-width: 0;
      }

      .left-shell,
      .right-shell,
      .left-panel.collapsed .left-shell,
      .right-panel.collapsed .right-shell {
        grid-template-columns: 1fr;
      }

      .curtain-handle {
        min-height: 40px;
      }

      .center {
        grid-template-rows: minmax(280px, auto) 52px auto;
      }

      .chart-box {
        width: 100%;
        aspect-ratio: 1.08 / 1;
      }

      .instrument-grid {
        grid-template-columns: 1fr;
      }

      .page-bar {
        overflow-x: auto;
        grid-template-columns: repeat(6, minmax(100px, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="workspace">
      <!-- LEFT -->
      <aside class="left-panel" id="leftPanel">
        <div class="left-shell">
          <div class="left-content">
            <h2 class="section-title">Tickers</h2>
          </div>
          <div class="curtain-handle" id="leftHandle" aria-label="Toggle left panel">‹</div>
        </div>
      </aside>

      <!-- CENTER -->
      <main class="center">
        <section class="chart-wrap">
          <div class="chart-box">
            <h1 class="section-title">Chart Area</h1>
          </div>
        </section>

        <section class="volume-box">
          <h2 class="small-label">Volume</h2>
        </section>

        <section class="instrument-panel" id="instrumentPanel">
          <div class="instrument-header">
            <div class="instrument-title-wrap">
              <h2 class="section-title">FieldOS Instruments</h2>
              <p class="section-subtitle">Choose a category to open instruments</p>
            </div>
            <button class="instrument-toggle" id="instrumentToggle" type="button">Hide</button>
          </div>

          <div class="instrument-body">
            <div class="instrument-grid">
              <button class="instrument-card" type="button">
                <span class="card-title">Flow</span>
                <span class="card-text">Order book pressure, absorption</span>
              </button>

              <button class="instrument-card" type="button">
                <span class="card-title">Momentum</span>
                <span class="card-text">Impulse, continuation, decay behavior</span>
              </button>

              <button class="instrument-card" type="button">
                <span class="card-title">Structure</span>
                <span class="card-text">Anchors, levels, compression zones</span>
              </button>

              <button class="instrument-card" type="button">
                <span class="card-title">Volatility</span>
                <span class="card-text">Turbulence, range expansion</span>
              </button>

              <button class="instrument-card" type="button">
                <span class="card-title">Signal</span>
                <span class="card-text">Confirmation, divergence</span>
              </button>

              <button class="instrument-card" type="button">
                <span class="card-title">Custom</span>
                <span class="card-text">Saved user instruments</span>
              </button>
            </div>
          </div>
        </section>
      </main>

      <!-- RIGHT -->
      <aside class="right-panel" id="rightPanel">
        <div class="right-shell">
          <div class="curtain-handle" id="rightHandle" aria-label="Toggle right panel">›</div>
          <div class="right-content">
            <div class="right-topbar">
              <button class="module-add-icon" type="button" aria-label="Add module">+</button>
            </div>
            <div class="right-empty">
              <h2 class="section-title">Info Workspace</h2>
              <p class="section-subtitle">Add a module for market context, notes, or live tools</p>
              <button class="add-module-btn" type="button">
                <span>+</span>
                <span>Add Module</span>
              </button>
            </div>
          </div>
        </div>
      </aside>
    </div>

    <!-- PAGE BAR -->
    <nav class="page-bar" aria-label="Page navigation">
      <button class="page-tab active" type="button">Chart</button>
      <button class="page-tab" type="button">Volume</button>
      <button class="page-tab" type="button">Instruments</button>
      <button class="page-tab" type="button">Order Book</button>
      <button class="page-tab" type="button">Signals</button>
      <button class="page-tab" type="button">News</button>
    </nav>
  </div>

  <script>
    const leftPanel = document.getElementById("leftPanel");
    const rightPanel = document.getElementById("rightPanel");
    const leftHandle = document.getElementById("leftHandle");
    const rightHandle = document.getElementById("rightHandle");
    const instrumentPanel = document.getElementById("instrumentPanel");
    const instrumentToggle = document.getElementById("instrumentToggle");

    leftHandle.addEventListener("click", () => {
      leftPanel.classList.toggle("collapsed");
      leftHandle.textContent = leftPanel.classList.contains("collapsed") ? "›" : "‹";
    });

    rightHandle.addEventListener("click", () => {
      rightPanel.classList.toggle("collapsed");
      rightHandle.textContent = rightPanel.classList.contains("collapsed") ? "‹" : "›";
    });

    instrumentToggle.addEventListener("click", () => {
      instrumentPanel.classList.toggle("collapsed");
      instrumentToggle.textContent = instrumentPanel.classList.contains("collapsed") ? "Show" : "Hide";
    });
  </script>
</body>
</html>
