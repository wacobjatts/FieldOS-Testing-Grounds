<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WhaleWatcher v1 | Truth Engine</title>
    <style>
        body { font-family: monospace; background: #0f0f0f; color: #00ff00; padding: 20px; }
        .gauge { border: 2px solid #00ff00; padding: 20px; margin-bottom: 20px; text-align: center; }
        #precision-value { font-size: 3em; font-bold: true; }
        button { background: #00ff00; color: #000; border: none; padding: 10px; cursor: pointer; margin: 5px; }
        button:hover { background: #fff; }
        .log { background: #1a1a1a; padding: 10px; height: 200px; overflow-y: scroll; border: 1px solid #333; }
    </style>
</head>
<body>
    <h1>WHALEWATCHER_CORE_V1</h1>
    
    <div class="gauge">
        <div>EFFECTIVE_PRECISION</div>
        <div id="precision-value">1.00</div>
        <div id="ghost-status">GHOST_SCAN_IDLE</div>
    </div>

    <h3>RUN_SIMULATION_VECTORS</h3>
    <button onclick="runSim('VIRAL_BOT')">TEST_GHOST_DETECTION</button>
    <button onclick="runSim('MUD_PIT')">TEST_PASSIVE_STAGNATION</button>
    <button onclick="runSim('ACTIVE_BARRIER')">TEST_ACTIVE_OPPOSITION</button>

    <h3>SYSTEM_LOG</h3>
    <div id="log" class="log"></div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
