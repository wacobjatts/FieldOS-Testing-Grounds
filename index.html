<!-- CENTER SECTION ONLY -->
<section class="center-section">

  <!-- Sticky stack -->
  <div class="center-sticky">

    <!-- Chart -->
    <div class="chart-area">
      <h2>Chart Area</h2>
    </div>

    <!-- Volume -->
    <div class="volume-area">
      <span>Volume</span>
    </div>

  </div>

  <!-- Scrollable content -->
  <div class="center-scroll">

    <!-- Instrument Section -->
    <div class="instrument-inline" id="instrumentInline">

      <!-- Default trigger -->
      <button class="instrument-add" id="instrumentAddBtn">
        + Add Instrument
      </button>

      <!-- Expanded panel -->
      <div class="instrument-panel hidden" id="instrumentPanel">

        <!-- Header -->
        <div class="instrument-header">
          <div>
            <strong id="instrumentTitle">FieldOS Instruments</strong>
            <p id="instrumentSubtitle">Select a category</p>
          </div>

          <div class="instrument-actions">
            <button id="instrumentBack" class="hidden">Back</button>
            <button id="instrumentClose">Hide</button>
          </div>
        </div>

        <!-- Category view -->
        <div class="instrument-categories" id="instrumentCategories">

          <button data-cat="absorption">Absorption</button>
          <button data-cat="tension">Core Tension</button>
          <button data-cat="entropy">Entropy</button>
          <button data-cat="liar">Liar Index</button>
          <button data-cat="mismatch">Mismatch</button>
          <button data-cat="reality">Reality Gap</button>

        </div>

        <!-- Instrument list -->
        <div class="instrument-list hidden" id="instrumentList"></div>

        <!-- Active instrument -->
        <div class="instrument-active hidden" id="instrumentActive">
          <h3 id="activeName"></h3>
          <p id="activeDesc"></p>

          <div class="instrument-actions">
            <button id="changeInstrument">Change</button>
            <button id="removeInstrument">Remove</button>
          </div>

          <div class="instrument-workspace">
            Instrument workspace lives here
          </div>
        </div>

      </div>

    </div>

  </div>

</section>

<style>
.center-section {
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Sticky area */
.center-sticky {
  position: sticky;
  top: 0;
  z-index: 2;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* Chart */
.chart-area {
  height: 44vh;
  border: 1px solid #3a3a3a;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Volume */
.volume-area {
  height: 48px;
  border: 1px solid #3a3a3a;
  display: flex;
  align-items: center;
  padding: 0 10px;
}

/* Scroll content */
.center-scroll {
  flex: 1;
  overflow-y: auto;
  padding-top: 10px;
}

/* Instrument */
.instrument-inline {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.instrument-add {
  height: 42px;
  border: 1px solid #3a3a3a;
  background: none;
  color: white;
}

.instrument-panel {
  border: 1px solid #3a3a3a;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.hidden {
  display: none;
}

.instrument-header {
  display: flex;
  justify-content: space-between;
}

.instrument-categories,
.instrument-list {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
}

.instrument-active {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.instrument-workspace {
  height: 120px;
  border: 1px solid #3a3a3a;
  display: flex;
  align-items: center;
  justify-content: center;
}
</style>

<script>
const addBtn = document.getElementById("instrumentAddBtn");
const panel = document.getElementById("instrumentPanel");
const closeBtn = document.getElementById("instrumentClose");
const backBtn = document.getElementById("instrumentBack");

const categories = document.getElementById("instrumentCategories");
const list = document.getElementById("instrumentList");
const active = document.getElementById("instrumentActive");

const title = document.getElementById("instrumentTitle");
const subtitle = document.getElementById("instrumentSubtitle");

const activeName = document.getElementById("activeName");
const activeDesc = document.getElementById("activeDesc");

addBtn.onclick = () => {
  panel.classList.remove("hidden");
};

closeBtn.onclick = () => {
  panel.classList.add("hidden");
};

categories.querySelectorAll("button").forEach(btn => {
  btn.onclick = () => {
    categories.classList.add("hidden");
    list.classList.remove("hidden");
    backBtn.classList.remove("hidden");

    title.textContent = btn.textContent;

    list.innerHTML = `
      <button data-i="A3">A3 Absorption Memory Curve</button>
      <button data-i="T6">T6 Compression Spark</button>
    `;

    list.querySelectorAll("button").forEach(i => {
      i.onclick = () => {
        list.classList.add("hidden");
        active.classList.remove("hidden");

        activeName.textContent = i.textContent;
        activeDesc.textContent = "Active instrument selected.";
      };
    });
  };
});

backBtn.onclick = () => {
  list.classList.add("hidden");
  active.classList.add("hidden");
  categories.classList.remove("hidden");
  backBtn.classList.add("hidden");
};
</script>
