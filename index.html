<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>FieldOS / Kinetic - Physical Alignment Shell</title>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    :root {
      /* Core Neutrals */
      --void-bg: #000000;
      --rack-bg: #050505;
      --panel-bg: #0a0a0a;
      --border-low: #111111;
      --text-main: #e8e8e8;
      --text-dim: #666666;
      --text-dark: #444444;

      /* Kinetic Accents (Default: TRON Blue) */
      --accent-core: #00e5ff;
      --accent-glow: rgba(0, 229, 255, 0.4);
      --accent-surface: rgba(0, 229, 255, 0.05);
    }

    [data-theme="red"] { --accent-core: #ff3e3e; --accent-glow: rgba(255, 62, 62, 0.4); }
    [data-theme="orange"] { --accent-core: #ff9f1c; --accent-glow: rgba(255, 159, 28, 0.4); }
    [data-theme="green"] { --accent-core: #2ec4b6; --accent-glow: rgba(46, 196, 182, 0.4); }

    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--void-bg); color: var(--text-main); font-family: -apple-system, sans-serif; overflow: hidden; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    .app-shell { position: fixed; inset: 0; display: grid; grid-template-rows: 1fr auto; padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 10px; }
    .workspace-shell { display: grid; grid-template-columns: auto 1fr auto; gap: 10px; min-height: 0; overflow: hidden; }

    /* CURTAINS */
    .curtain { height: 100%; overflow: hidden; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; border: 1px solid var(--border-low); background: var(--rack-bg); }
    .left-curtain { width: 130px; }
    .right-curtain { width: 120px; }
    .curtain.is-collapsed { width: 24px !important; border-color: transparent; }

    .curtain-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 8px; }
    .curtain.is-collapsed .curtain-content { display: none; }
    .curtain-handle { width: 24px; background: var(--panel-bg); color: var(--text-dim); cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; border: none; outline: none; transition: color 0.2s; }
    .curtain-handle:hover { color: var(--accent-core); }

    /* CENTER WORKSPACE */
    .center-workspace { display: flex; flex-direction: column; overflow-y: auto; gap: 6px; scrollbar-width: none; }
    .center-workspace::-webkit-scrollbar { display: none; }
    
    .chart-box { position: sticky; top: 0; z-index: 20; background: var(--void-bg); width: 100%; aspect-ratio: 1.1 / 1; border: 1px solid var(--border-low); }

    /* STACK CARDS */
    .middle-stack { display: flex; flex-direction: column; gap: 6px; }
    .stack-card { background: var(--void-bg); display: flex; flex-direction: column; border-bottom: 1px solid var(--border-low); transition: border 0.3s; }
    
    @keyframes breathe {
      0%, 100% { box-shadow: inset 0 0 5px var(--accent-surface); }
      50% { box-shadow: inset 0 0 15px var(--accent-surface); border-bottom-color: var(--accent-core); }
    }
    .stack-card:hover { animation: breathe 3s infinite ease-in-out; }

    .card-header { padding: 8px 6px; display: flex; justify-content: space-between; align-items: center; }
    .card-title { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; margin: 0; color: var(--text-main); }
    .card-category { font-size: 8px; color: var(--text-dark); text-transform: uppercase; font-weight: bold; }
    
    .card-visual-area { background: var(--rack-bg); height: 100px; width: 100%; position: relative; overflow: hidden; border-top: 1px solid var(--border-low); }
    .card-readout { display: flex; gap: 12px; padding: 6px; background: var(--void-bg); border-top: 1px solid var(--border-low); }
    
    .readout-item { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--accent-core); text-shadow: 0 0 8px var(--accent-glow); }
    .readout-label { color: var(--text-dark); margin-right: 4px; font-weight: bold; }

    /* MENU */
    .bottom-menu-wrap { height: 54px; display: grid; grid-template-columns: repeat(6, 1fr) 40px; background: var(--void-bg); border-top: 1px solid var(--border-low); }
    .menu-item { background: transparent; border: none; color: var(--text-main); font-size: 8px; text-transform: uppercase; cursor: pointer; letter-spacing: 1px; }
  </style>
</head>
<body>

<div class="app-shell">
  <div class="workspace-shell">
    <aside class="curtain left-curtain" id="leftCurtain">
      <div class="curtain-content">
        <div style="font-size: 10px; color: var(--text-dim); margin-bottom: 10px;">WATCHLIST</div>
      </div>
      <button class="curtain-handle" onclick="toggleCurtain('leftCurtain')">‹</button>
    </aside>

    <main class="center-workspace">
      <section class="chart-box" id="chartContainer"></section>

      <div class="middle-stack">
        <section class="stack-card" id="card-asymmetry-field">
          <div class="card-header"><h3 class="card-title">Asymmetry Field</h3><span class="card-category">Force</span></div>
          <div class="card-visual-area"><canvas id="canvas-asymmetry"></canvas></div>
          <div class="card-readout">
            <div class="readout-item"><span class="readout-label">BIAS</span><span id="val-bias">0</span></div>
            <div class="readout-item"><span class="readout-label">EFFORT</span><span id="val-effort">0</span></div>
          </div>
        </section>

        <section class="stack-card" id="card-entropy-phase">
          <div class="card-header"><h3 class="card-title">Entropy Phase</h3><span class="card-category">Environment</span></div>
          <div class="card-visual-area"><canvas id="canvas-entropy"></canvas></div>
          <div class="card-readout">
            <div class="readout-item"><span class="readout-label">DISORDER</span><span id="val-disorder">0</span></div>
            <div class="readout-item"><span class="readout-label">STABILITY</span><span id="val-stability">0</span></div>
          </div>
        </section>

        <section class="stack-card" id="card-inertia-field">
          <div class="card-header"><h3 class="card-title">Inertia Field</h3><span class="card-category">Inertia</span></div>
          <div class="card-visual-area"><canvas id="canvas-inertia"></canvas></div>
          <div class="card-readout">
            <div class="readout-item"><span class="readout-label">INERTIA</span><span id="val-inertia">0</span></div>
            <div class="readout-item"><span class="readout-label">MASS</span><span id="val-mass">0</span></div>
          </div>
        </section>
      </div>
    </main>

    <aside class="curtain right-curtain" id="rightCurtain">
      <button class="curtain-handle" onclick="toggleCurtain('rightCurtain')">›</button>
      <div class="curtain-content">
        <div style="font-size: 10px; color: var(--text-dim);">SYSTEM</div>
      </div>
    </aside>
  </div>

  <footer class="bottom-menu-wrap">
    <button class="menu-item">Volume</button>
    <button class="menu-item">Chart</button>
    <button class="menu-item">Instr</button>
    <button class="menu-item">Book</button>
    <button class="menu-item">Sig</button>
    <button class="menu-item">News</button>
    <button class="menu-item">⌄</button>
  </footer>
</div>

<script>
  // 1. CHART ENGINE
  const chart = LightweightCharts.createChart(document.getElementById('chartContainer'), {
    layout: { background: { color: '#000' }, textColor: '#ccc', fontFamily: 'JetBrains Mono' },
    grid: { vertLines: { color: '#0a0a0a' }, horzLines: { color: '#0a0a0a' } },
    timeScale: { borderColor: '#111' },
  });
  const candleSeries = chart.addCandlestickSeries({
    upColor: '#00e5ff', downColor: '#333', borderVisible: false, wickUpColor: '#00e5ff', wickDownColor: '#333'
  });

  // Mock Data
  const data = []; let time = new Date(2026, 0, 1);
  for(let i=0; i<100; i++) {
    data.push({ time: time.toISOString().split('T')[0], open: 100+i, high: 105+i, low: 98+i, close: 103+i });
    time.setDate(time.getDate() + 1);
  }
  candleSeries.setData(data);

  // 2. PAINTERS & ENGINE
  function toggleCurtain(id) { document.getElementById(id).classList.toggle('is-collapsed'); }

  function paintGeneric(id, color) {
    const canvas = document.getElementById(id);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    ctx.clearRect(0,0,rect.width, rect.height);
    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.moveTo(0, rect.height * 0.8);
    for(let x=0; x<rect.width; x+=5) ctx.lineTo(x, rect.height * 0.8 - Math.random() * 40);
    ctx.stroke();
  }

  function loop() {
    paintGeneric('canvas-asymmetry', '#00e5ff');
    paintGeneric('canvas-entropy', '#ff9f1c');
    paintGeneric('canvas-inertia', '#2ec4b6');
    requestAnimationFrame(loop);
  }
  loop();
</script>
</body>
</html>
