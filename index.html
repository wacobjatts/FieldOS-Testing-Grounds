<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIELD-OS // TEMPORAL PRECISION</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="terminal">
        <header class="top-bar">
            <div class="brand">FIELD-OS // KINETIC PRECISION</div>
            <div class="connection-status">
                SIGNAL: <span class="glow">ENCRYPTED</span> // 
                NODE: US-EAST-1
            </div>
        </header>

        <div class="main-layout">
            <aside class="sidebar">
                
                <section class="temporal-module">
                    <div class="clock-block">
                        <label class="tiny-label">SYSTEM TIME</label>
                        <div id="live-clock" class="digital-glow">00:00:00</div>
                    </div>
                    <div class="timestamp-block">
                        <span class="tiny-label">DATA TIME:</span>
                        <span id="data-timestamp" class="mono-fade">00:00:00</span>
                    </div>
                    <div class="playback-status">
                        <div class="led pulse"></div> LIVE DATA STREAM
                    </div>
                </section>

                <section class="control-group">
                    <label>SELECT CALIBRATION MODEL</label>
                    <select id="instrument-select">
                        <option value="absorption">ABSORPTION PRECISION</option>
                        <option value="kinetic">KINETIC MOMENTUM</option>
                        <option value="liquidity">LIQUIDITY DENSITY</option>
                    </select>
                </section>

                <section class="formula-block">
                    <label>ACTIVE SOURCE CODE</label>
                    <pre id="code-display"><code>// Logic Calibration Active...</code></pre>
                </section>

                <section class="live-metrics">
                    <div class="metric">
                        <label>TRUST INTEGRITY</label>
                        <div id="stat-precision" class="value">0.0%</div>
                    </div>
                    <div class="metric">
                        <label>DIVERGENCE DELTA</label>
                        <div id="stat-divergence" class="value">0.000</div>
                    </div>
                </section>

                <footer class="legal-notice">
                    PROPRIETARY ALGORITHMIC ACCESS.
                </footer>
            </aside>

            <main class="chart-stage">
                <div class="chart-container">
                    <canvas id="dualChart"></canvas>
                </div>
                
                <div class="data-strip">
                    <div class="entry">
                        <span class="key">PRICE:</span>
                        <span id="raw-price" class="val">0.00</span>
                    </div>
                    <div class="entry">
                        <span class="key">SAMPLE DENSITY:</span>
                        <span id="raw-trades" class="val">0</span>
                    </div>
                    <div class="entry">
                        <span class="key">SNAPSHOT LAG:</span>
                        <span id="raw-age" class="val">0ms</span>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
