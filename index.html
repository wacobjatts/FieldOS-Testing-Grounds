<!-- LEFT TICKER SECTION ONLY -->
<section class="left-ticker-panel" id="leftTickerPanel">
  <div class="left-ticker-shell">

    <!-- Main ticker content -->
    <div class="left-ticker-content">
      <div class="ticker-panel-header">
        <h2 class="ticker-panel-title">Tickers</h2>
        <button class="ticker-list-add-btn" type="button" aria-label="Create new list">+</button>
      </div>

      <div class="ticker-search-wrap">
        <input
          type="text"
          class="ticker-search-input"
          id="tickerSearchInput"
          placeholder="Search symbol"
          autocomplete="off"
        />
      </div>

      <div class="ticker-lists-wrap">
        <div class="ticker-lists-header">
          <span class="ticker-lists-title">Lists</span>
        </div>

        <div class="ticker-lists" id="tickerLists">
          <button class="ticker-list-chip is-active" type="button">Main</button>
          <button class="ticker-list-chip" type="button">Tech</button>
          <button class="ticker-list-chip" type="button">Crypto</button>
        </div>
      </div>

      <div class="ticker-watchlist-wrap">
        <div class="ticker-watchlist-header">
          <span class="ticker-watchlist-title">Watchlist</span>
        </div>

        <div class="ticker-watchlist" id="tickerWatchlist">
          <button class="ticker-row is-active" type="button" data-symbol="AAPL">
            <span class="ticker-symbol">AAPL</span>
            <span class="ticker-price">214.43</span>
          </button>

          <button class="ticker-row" type="button" data-symbol="NVDA">
            <span class="ticker-symbol">NVDA</span>
            <span class="ticker-price">132.17</span>
          </button>

          <button class="ticker-row" type="button" data-symbol="TSLA">
            <span class="ticker-symbol">TSLA</span>
            <span class="ticker-price">176.80</span>
          </button>

          <button class="ticker-row" type="button" data-symbol="SPY">
            <span class="ticker-symbol">SPY</span>
            <span class="ticker-price">518.22</span>
          </button>

          <button class="ticker-row" type="button" data-symbol="QQQ">
            <span class="ticker-symbol">QQQ</span>
            <span class="ticker-price">442.11</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Curtain handle -->
    <button
      class="left-ticker-curtain-handle"
      id="leftTickerCurtainHandle"
      type="button"
      aria-label="Collapse ticker panel"
    >
      ‹
    </button>
  </div>
</section>

<style>
  .left-ticker-panel {
    width: 88px;
    min-width: 88px;
    overflow: hidden;
    transition: width 0.22s ease;
  }

  .left-ticker-panel.is-open {
    width: 88px;
    min-width: 88px;
  }

  .left-ticker-panel.is-collapsed {
    width: 18px;
    min-width: 18px;
  }

  .left-ticker-shell {
    height: 100%;
    display: grid;
    grid-template-columns: 1fr 18px;
    gap: 0;
  }

  .left-ticker-panel.is-collapsed .left-ticker-shell {
    grid-template-columns: 0 18px;
  }

  .left-ticker-content {
    border: 1px solid #3a3a3a;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-width: 0;
    padding: 10px 8px;
    gap: 10px;
  }

  .left-ticker-panel.is-collapsed .left-ticker-content {
    border: 0;
    padding: 0;
  }

  .ticker-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .ticker-panel-title {
    margin: 0;
    font-size: 16px;
    font-weight: 700;
    line-height: 1.1;
    color: #e8e8e8;
  }

  .ticker-list-add-btn {
    width: 28px;
    height: 28px;
    border: 1px solid #3a3a3a;
    background: transparent;
    color: #e8e8e8;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    flex: 0 0 auto;
  }

  .ticker-search-wrap {
    width: 100%;
  }

  .ticker-search-input {
    width: 100%;
    height: 34px;
    border: 1px solid #3a3a3a;
    background: transparent;
    color: #e8e8e8;
    padding: 0 10px;
    font-size: 12px;
    outline: none;
  }

  .ticker-search-input::placeholder {
    color: #9f9f9f;
  }

  .ticker-lists-wrap,
  .ticker-watchlist-wrap {
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 0;
  }

  .ticker-lists-header,
  .ticker-watchlist-header {
    display: flex;
    align-items: center;
  }

  .ticker-lists-title,
  .ticker-watchlist-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #b8b8b8;
  }

  .ticker-lists {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .ticker-list-chip {
    width: 100%;
    min-height: 32px;
    border: 1px solid #3a3a3a;
    background: transparent;
    color: #d9d9d9;
    font-size: 12px;
    text-align: left;
    padding: 0 10px;
    cursor: pointer;
  }

  .ticker-list-chip.is-active {
    font-weight: 700;
  }

  .ticker-watchlist {
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 0;
  }

  .ticker-row {
    width: 100%;
    min-height: 40px;
    border: 1px solid #3a3a3a;
    background: transparent;
    color: #e8e8e8;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 0 10px;
    cursor: pointer;
    text-align: left;
  }

  .ticker-row.is-active {
    font-weight: 700;
  }

  .ticker-symbol,
  .ticker-price {
    font-size: 12px;
    line-height: 1;
    white-space: nowrap;
  }

  .left-ticker-curtain-handle {
    border: 1px solid #3a3a3a;
    background: transparent;
    color: #d8d8d8;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    width: 18px;
    padding: 0;
  }

  @media (min-width: 430px) {
    .left-ticker-panel,
    .left-ticker-panel.is-open {
      width: 96px;
      min-width: 96px;
    }
  }
</style>

<script>
  (function () {
    const panel = document.getElementById("leftTickerPanel");
    const handle = document.getElementById("leftTickerCurtainHandle");
    const rows = Array.from(document.querySelectorAll(".ticker-row"));
    const chips = Array.from(document.querySelectorAll(".ticker-list-chip"));

    panel.classList.add("is-open");

    handle.addEventListener("click", () => {
      const collapsed = panel.classList.toggle("is-collapsed");
      panel.classList.toggle("is-open", !collapsed);
      handle.textContent = collapsed ? "›" : "‹";
      handle.setAttribute(
        "aria-label",
        collapsed ? "Open ticker panel" : "Collapse ticker panel"
      );
    });

    rows.forEach((row) => {
      row.addEventListener("click", () => {
        rows.forEach((r) => r.classList.remove("is-active"));
        row.classList.add("is-active");
      });
    });

    chips.forEach((chip) => {
      chip.addEventListener("click", () => {
        chips.forEach((c) => c.classList.remove("is-active"));
        chip.classList.add("is-active");
      });
    });
  })();
</script>
