<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>FieldOS / Kinetic</title>
  <style>
    /* GLOBAL STYLES */
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000000; color: #e8e8e8; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    .app-shell { position: fixed; inset: 0; display: grid; grid-template-rows: 1fr auto; padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 10px; }
    .workspace-shell { display: grid; grid-template-columns: auto 1fr auto; gap: 10px; min-height: 0; overflow: hidden; }

    /* CURTAINS */
    .curtain { height: 100%; overflow: hidden; transition: width 0.2s ease; display: flex; }
    .left-curtain { width: 130px; }
    .right-curtain { width: 120px; }
    .curtain.is-collapsed { width: 20px !important; }

    .curtain-content { flex: 1; border: 1px solid #353535; display: flex; flex-direction: column; overflow: hidden; padding: 8px; background: #000; }
    .curtain.is-collapsed .curtain-content { display: none; }
    .curtain-handle { width: 20px; border: 1px solid #353535; background: #000; color: #e8e8e8; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }

    /* TICKER / WATCHLIST */
    .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .panel-title { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #666; margin: 0; }
    .list-selector { display: flex; gap: 4px; overflow-x: auto; margin-bottom: 10px; scrollbar-width: none; }
    .list-tab { background: transparent; border: 1px solid #222; color: #666; font-size: 9px; padding: 3px 6px; cursor: pointer; white-space: nowrap; }
    .list-tab.is-active { border-color: #00ffff; color: #00ffff; }

    .ticker-search { width: 100%; background: #111; border: 1px solid #353535; color: #fff; padding: 6px; margin-bottom: 10px; font-size: 11px; outline: none; }
    .ticker-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
    .ticker-row { display: grid; grid-template-columns: 1fr auto; border: 1px solid #222; padding: 6px; cursor: pointer; font-size: 10px; }
    .ticker-row.is-active { border-color: #00ffff; background: #001515; }
    .t-price { color: #00ff00; text-align: right; }
    .t-delta { font-size: 8px; color: #666; display: block; }

    /* CENTER WORKSPACE */
    .center-workspace { display: flex; flex-direction: column; overflow-y: auto; gap: 10px; scrollbar-width: none; }
    .center-workspace::-webkit-scrollbar { display: none; }
    .chart-box { position: sticky; top: 0; z-index: 20; background: #000; width: 100%; aspect-ratio: 1.2 / 1; border: 1px solid #353535; display: flex; align-items: center; justify-content: center; font-weight: bold; }

    .active-box { min-height: 120px; border: 1px solid #353535; background: #050505; display: flex; align-items: center; justify-content: center; color: #00ffff; font-weight: bold; font-size: 14px; text-align: center; padding: 10px; }
    .volume-strip { height: 34px; border: 1px solid #353535; display: flex; align-items: center; padding: 0 10px; font-size: 11px; font-weight: bold; color: #444; }

    /* INSTRUMENT INFO STRIP */
    .active-header { border: 1px solid #353535; padding: 8px; display: flex; justify-content: space-between; align-items: center; background: #000; }
    .active-title { font-size: 12px; font-weight: bold; margin: 0; }
    .active-desc { font-size: 10px; color: #666; margin: 2px 0 0 0; }

    /* CHOOSER */
    .chooser-panel { border: 1px solid #353535; display: flex; flex-direction: column; background: #000; }
    .chooser-top-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #353535; background: #111; }
    .chooser-section-label { font-size: 9px; color: #444; text-transform: uppercase; padding: 10px 10px 4px 10px; letter-spacing: 1px; font-weight: bold; }
    
    .quick-access-list { padding: 4px 10px 10px 10px; display: flex; flex-direction: column; gap: 4px; }
    .quick-btn { background: transparent; border: 1px solid #222; color: #ccc; padding: 10px; text-align: left; cursor: pointer; font-size: 11px; }

    .category-card { border-bottom: 1px solid #222; }
    .category-head { width: 100%; background: transparent; border: none; color: #fff; padding: 10px; text-align: left; display: flex; justify-content: space-between; cursor: pointer; font-size: 11px; }
    .category-content { display: none; flex-direction: column; background: #050505; }
    .category-card.is-expanded .category-content { display: flex; }
    .sub-item { padding: 10px; background: transparent; border: none; border-bottom: 1px solid #111; color: #aaa; text-align: left; font-size: 10px; cursor: pointer; }

    /* RIGHT MODULES */
    .module-stack { display: grid; gap: 8px; height: 100%; }
    .module-card { border: 1px solid #353535; display: flex; flex-direction: column; min-height: 0; }
    .module-head { padding: 4px 8px; border-bottom: 1px solid #353535; display: flex; justify-content: space-between; background: #111; font-size: 9px; font-weight: bold; }
    .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 10px; color: #444; font-size: 10px; }
    
    /* PICKER BUTTONS (Distinct from list-tabs) */
    .picker-btn { background: transparent; border: 1px solid #222; color: #ccc; font-size: 9px; padding: 6px; cursor: pointer; display: block; width: 100%; text-align: left; margin-bottom: 4px; }

    /* BOTTOM MENU */
    .bottom-menu-wrap { border: 1px solid #353535; height: 54px; display: grid; grid-template-columns: repeat(6, 1fr) 40px; background: #000; }
    .menu-item { background: transparent; border: none; border-right: 1px solid #222; color: #fff; font-size: 8px; text-transform: uppercase; cursor: pointer; }
    .reopen-menu { position: fixed; bottom: 10px; right: 10px; background: #000; border: 1px solid #353535; color: #fff; padding: 6px 10px; font-size: 10px; z-index: 100; display: none; border-radius: 2px; }

    .is-hidden { display: none !important; }
    .ghost-btn { background: transparent; border: 1px solid #353535; color: #fff; padding: 4px 8px; font-size: 10px; cursor: pointer; }
    .icon-btn { background: transparent; border: 1px solid #353535; color: #fff; width: 22px; height: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>

<div class="app-shell">
  <div class="workspace-shell">
    
    <aside class="curtain left-curtain" id="leftCurtain">
      <div class="curtain-content">
        <div class="panel-header"><span class="panel-title">Watchlists</span><button class="icon-btn">+</button></div>
        <div class="list-selector" id="listSelector">
          <button class="list-tab is-active" onclick="switchList(this, 'Main')">Main</button>
          <button class="list-tab" onclick="switchList(this, 'Tech')">Tech</button>
          <button class="list-tab" onclick="switchList(this, 'Alts')">Alts</button>
        </div>
        <input type="text" class="ticker-search" placeholder="Find symbol...">
        <div class="ticker-list" id="tickerList"></div>
      </div>
      <button class="curtain-handle" id="leftHandle" onclick="toggleCurtain('leftCurtain')">‹</button>
    </aside>

    <main class="center-workspace">
      <section class="chart-box" id="chartBox">CHART: <span id="activeTickerDisplay">AAPL</span></section>

      <section class="active-box is-hidden" id="activeBox">
        <div id="activeBoxContent">Instrument Visual</div>
      </section>

      <section class="volume-strip">VOLUME: RELATIVE CLOUD</section>

      <section class="active-header is-hidden" id="activeHeader">
        <div class="info-meta">
          <h3 class="active-title" id="activeTitle">---</h3>
          <p class="active-desc" id="activeDesc">---</p>
        </div>
        <div style="display:flex; gap:6px;">
          <button class="ghost-btn" onclick="openChooser()">Change</button>
          <button class="ghost-btn" onclick="clearActiveInstrument()">×</button>
        </div>
      </section>

      <section class="instrument-chooser-area">
        <button class="ghost-btn" id="addInstrBtn" onclick="openChooser()" style="margin: 0 auto; display: block; padding: 10px 20px;">+ Add Instrument</button>

        <div class="chooser-panel is-hidden" id="chooserPanel">
          <div class="chooser-top-bar"><span class="panel-title" style="color:#fff">Instruments</span><button class="ghost-btn" onclick="closeChooser()">Hide</button></div>
          
          <div class="chooser-section-label">Quick Access</div>
          <div class="quick-access-list">
            <button class="quick-btn" onclick="selectInstrument('Kinetic Manifold', 'Combines force and truth into a single live view.')">Kinetic Manifold</button>
            <button class="quick-btn" onclick="selectInstrument('Compression / Expansion', 'Tracks the breathing cycle of market compression.')">Compression / Expansion</button>
            <button class="quick-btn" onclick="selectInstrument('Precision / Confidence', 'Shows confidence conditions for the current structure.')">Precision / Confidence</button>
          </div>

          <div class="chooser-section-label">Categories</div>
          <div id="categoryContainer"></div>
        </div>
      </section>
      <div style="min-height: 20px;"></div>
    </main>

    <aside class="curtain right-curtain" id="rightCurtain">
      <button class="curtain-handle" id="rightHandle" onclick="toggleCurtain('rightCurtain')">›</button>
      <div class="curtain-content">
        <div class="panel-header"><span class="panel-title">Info</span><button class="icon-btn" onclick="toggleModulePicker()">+</button></div>
        <div class="module-picker-overlay is-hidden" id="modulePicker" style="margin-bottom:10px;">
          <button class="picker-btn" onclick="addModule('Order Book')">Order Book</button>
          <button class="picker-btn" onclick="addModule('Notes')">Notes</button>
          <button class="picker-btn" onclick="addModule('Signals')">Signals</button>
        </div>
        <div class="empty-state" id="rightEmpty"><span>Workspace Empty</span><button class="ghost-btn" onclick="toggleModulePicker()">+ Add</button></div>
        <div class="module-stack is-hidden" id="moduleStack"></div>
      </div>
    </aside>
  </div>

  <footer class="bottom-menu-wrap" id="bottomMenu">
    <button class="menu-item">Chart</button><button class="menu-item">Volume</button><button class="menu-item">Instr</button><button class="menu-item">Book</button><button class="menu-item">Sig</button><button class="menu-item">News</button>
    <button class="menu-item" style="border:none; color:#666;" onclick="toggleBottomMenu(false)">⌄</button>
  </footer>
</div>

<button class="reopen-menu" id="reopenMenu" onclick="toggleBottomMenu(true)">OPEN MENU</button>

<script>
  const watchlists = {
    'Main': [['AAPL', '214.43', '+1.2%'], ['NVDA', '132.17', '-0.5%'], ['TSLA', '176.80', '+2.4%']],
    'Tech': [['MSFT', '420.10', '+0.8%'], ['GOOGL', '180.20', '+0.3%']],
    'Alts': [['BTC', '64,231', '-1.1%'], ['ETH', '3,450', '+0.9%']]
  };

  const categories = [
    { name: '1. Structural Field', items: [['Phase Boundaries', 'Architectural thresholds.'], ['Compression Zones', 'Market squeezing.']] },
    { name: '2. Force Field', items: [['Momentum Vector', 'Directional force.'], ['Acceleration Gradient', 'Speed change.']] },
    { name: '3. Resistance Field', items: [['Cost-to-Move Curve', 'Friction vs liquidity.'], ['Liquidity Density', 'Order book pockets.']] },
    { name: '4. Inertia Field', items: [['Move Inertia', 'Difficulty of stopping.'], ['Mass Class', 'Move classification.']] },
    { name: '5. Interpretation Field', items: [['Truth Field', 'Signal vs Noise.'], ['Confidence Metrics', 'System conviction.']] },
    { name: '6. Decision Field', items: [['Alignment Score', 'System aggregate.'], ['Entry Readiness', 'Action state.']] }
  ];

  let activeModules = [];

  function init() {
    renderTickers('Main');
    const container = document.getElementById('categoryContainer');
    categories.forEach(cat => {
      const card = document.createElement('div');
      card.className = 'category-card';
      card.innerHTML = `
        <button class="category-head" onclick="toggleCategory(this)"><span>${cat.name}</span><span>▾</span></button>
        <div class="category-content">${cat.items.map(i => `<button class="sub-item" onclick="selectInstrument('${i[0]}','${i[1]}')">${i[0]}</button>`).join('')}</div>
      `;
      container.appendChild(card);
    });
  }

  function toggleCurtain(id) {
    const curtain = document.getElementById(id);
    const handle = curtain.querySelector('.curtain-handle');
    const isCollapsed = curtain.classList.toggle('is-collapsed');
    
    if (id === 'leftCurtain') {
      handle.innerText = isCollapsed ? '›' : '‹';
    } else {
      handle.innerText = isCollapsed ? '‹' : '›';
    }
  }
  
  function toggleBottomMenu(show) {
    document.getElementById('bottomMenu').classList.toggle('is-hidden', !show);
    document.getElementById('reopenMenu').style.display = show ? 'none' : 'block';
  }

  function switchList(btn, name) {
    document.querySelectorAll('#listSelector .list-tab').forEach(t => t.classList.remove('is-active'));
    btn.classList.add('is-active');
    renderTickers(name);
  }

  function renderTickers(name) {
    const list = document.getElementById('tickerList');
    const activeTicker = document.getElementById('activeTickerDisplay').innerText;
    list.innerHTML = '';
    watchlists[name].forEach(t => {
      const row = document.createElement('div');
      row.className = 'ticker-row';
      if (t[0] === activeTicker) row.classList.add('is-active');
      row.innerHTML = `<span>${t[0]}</span><span class="t-price">${t[1]}<span class="t-delta">${t[2]}</span></span>`;
      row.onclick = () => {
        document.querySelectorAll('.ticker-row').forEach(r => r.classList.remove('is-active'));
        row.classList.add('is-active');
        document.getElementById('activeTickerDisplay').innerText = t[0];
      };
      list.appendChild(row);
    });
  }

  function openChooser() {
    document.getElementById('chooserPanel').classList.remove('is-hidden');
    document.getElementById('addInstrBtn').classList.add('is-hidden');
    collapseAllCategories();
  }

  function closeChooser() {
    document.getElementById('chooserPanel').classList.add('is-hidden');
    document.getElementById('addInstrBtn').classList.remove('is-hidden');
    collapseAllCategories();
  }

  function toggleCategory(btn) {
    const card = btn.parentElement;
    const isExpanded = card.classList.contains('is-expanded');
    collapseAllCategories();
    if(!isExpanded) card.classList.add('is-expanded');
  }

  function collapseAllCategories() { document.querySelectorAll('.category-card').forEach(c => c.classList.remove('is-expanded')); }

  function selectInstrument(name, desc) {
    document.getElementById('activeBoxContent').innerText = name;
    document.getElementById('activeTitle').innerText = name;
    document.getElementById('activeDesc').innerText = desc;
    document.getElementById('activeBox').classList.remove('is-hidden');
    document.getElementById('activeHeader').classList.remove('is-hidden');
    closeChooser();
  }

  function clearActiveInstrument() {
    document.getElementById('activeBox').classList.add('is-hidden');
    document.getElementById('activeHeader').classList.add('is-hidden');
    closeChooser();
  }

  function toggleModulePicker() { document.getElementById('modulePicker').classList.toggle('is-hidden'); }

  function addModule(type) {
    activeModules.push(type);
    document.getElementById('modulePicker').classList.add('is-hidden');
    renderModules();
  }

  function renderModules() {
    const stack = document.getElementById('moduleStack');
    const empty = document.getElementById('rightEmpty');
    if (activeModules.length === 0) {
      stack.classList.add('is-hidden');
      empty.classList.remove('is-hidden');
      return;
    }
    empty.classList.add('is-hidden');
    stack.classList.remove('is-hidden');
    stack.style.gridTemplateRows = `repeat(${activeModules.length}, minmax(0, 1fr))`;
    stack.innerHTML = '';
    activeModules.forEach((m, i) => {
      const card = document.createElement('div');
      card.className = 'module-card';
      card.innerHTML = `<div class="module-head"><span>${m}</span><span onclick="activeModules.splice(${i},1);renderModules()" style="cursor:pointer">×</span></div>
                        <div style="flex:1;padding:8px;font-size:9px;color:#666">${m === 'Notes' ? '<textarea style="width:100%;height:100%;background:transparent;color:#fff;border:none;outline:none;resize:none;"></textarea>' : 'Live data feed...'}</div>`;
      stack.appendChild(card);
    });
  }

  init();
</script>

</body>
</html>
