<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FieldOS / Kinetic</title>
    <style>
        /* 1. CORE BUILD RULES: #000000, NO FRAMEWORKS, IPHONE-FIRST */
        :root {
            --bg: #000000;
            --panel: #0a0a0a;
            --border: #1a1a1a;
            --cyan: #00ffff;
            --nav-h: 70px;
            --curtain-w: 280px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; background: var(--bg); color: #ffffff;
            font-family: -apple-system, system-ui, sans-serif;
            height: 100%; width: 100%; overflow: hidden; position: fixed;
        }

        /* THE APP SHELL */
        .app-shell {
            display: flex;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* CURTAIN SYSTEM - SIDEYWAYS COLLAPSE */
        .curtain {
            height: 100%;
            width: var(--curtain-w);
            background: var(--panel);
            border-right: 1px solid var(--border);
            transition: width 0.2s ease;
            flex-shrink: 0;
            z-index: 100;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .curtain.right { border-right: none; border-left: 1px solid var(--border); }
        .curtain.collapsed { width: 0 !important; border: none !important; }

        .curtain-inner { width: var(--curtain-w); padding: 20px; display: flex; flex-direction: column; height: 100%; }
        
        /* HANDLES */
        .handle {
            position: absolute; top: 40%; width: 20px; height: 100px; 
            background: var(--border); z-index: 101; cursor: pointer; display: none;
            border: 1px solid #333;
        }
        .handle-left { left: 0; border-radius: 0 8px 8px 0; }
        .handle-right { right: 0; border-radius: 8px 0 0 8px; }

        /* CENTER WORKSPACE */
        .center-workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            background: var(--bg);
            overflow: hidden;
        }

        /* 1. CHART - STICKY AT TOP */
        .chart-region {
            flex-shrink: 0;
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #050505;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* SCROLLABLE AREA */
        .scroll-content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 100px; /* Space for nav */
        }

        /* 2. ACTIVE INSTRUMENT */
        .active-instrument-region { padding: 15px; border-bottom: 1px solid var(--border); display: none; }
        .inst-box { width: 100%; height: 140px; background: #080808; border: 1px solid var(--border); margin-bottom: 8px; }
        .inst-header { font-size: 11px; font-weight: 900; color: var(--cyan); text-transform: uppercase; }

        /* 3. VOLUME */
        .volume-region { width: 100%; height: 60px; padding: 10px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-end; gap: 3px; }
        .vol-bar { flex: 1; background: #222; min-height: 4px; }

        /* 4. INSTRUMENT CHOOSER */
        .chooser-region { padding: 20px; }
        .add-btn { background: #111; border: 1px solid var(--border); color: #fff; width: 100%; padding: 15px; border-radius: 4px; font-size: 13px; font-weight: bold; }
        
        .chooser-ui { display: none; margin-top: 20px; }
        .section-label { font-size: 10px; color: #555; text-transform: uppercase; margin-bottom: 12px; letter-spacing: 1px; }
        .qa-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 25px; }
        .qa-item { font-size: 9px; border: 1px solid var(--border); padding: 12px 2px; text-align: center; border-radius: 4px; background: #0a0a0a; }

        .cat-card { border: 1px solid var(--border); margin-bottom: 10px; border-radius: 4px; background: #050505; }
        .cat-head { padding: 15px; font-size: 12px; font-weight: 800; display: flex; justify-content: space-between; }
        .cat-body { display: none; padding: 10px; border-top: 1px solid var(--border); }
        .cat-card.active .cat-body { display: block; }
        .inst-link { padding: 15px; font-size: 12px; color: #888; border-bottom: 1px solid #111; }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: var(--nav-h);
            background: #0a0a0a; border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center;
            z-index: 1000; padding-bottom: env(safe-area-inset-bottom);
        }
        .bottom-nav.hidden { display: none; }
        .nav-tab { font-size: 10px; color: #444; text-align: center; font-weight: 800; }
        .nav-tab.active { color: var(--cyan); }

        /* INPUTS */
        input { background: #111; border: 1px solid var(--border); color: #fff; padding: 12px; width: 100%; border-radius: 4px; margin-bottom: 20px; font-size: 16px; /* Prevents iOS zoom */ }
    </style>
</head>
<body>

<div class="app-shell">

    <aside class="curtain" id="l-curtain">
        <div class="curtain-inner">
            <div class="section-label" style="color: var(--cyan);">Tickers</div>
            <input type="text" placeholder="SEARCH...">
            <div style="flex:1; overflow-y:auto;">
                <div style="padding:15px 0; border-bottom:1px solid #1a1a1a;">TSLA <span style="float:right; color:var(--cyan)">$175.22</span></div>
                <div style="padding:15px 0; border-bottom:1px solid #1a1a1a;">BTC <span style="float:right; color:var(--cyan)">$64,102</span></div>
            </div>
            <button class="add-btn" onclick="toggleSide('l-curtain')">CLOSE</button>
        </div>
    </aside>
    <div class="handle handle-left" id="l-handle" onclick="toggleSide('l-curtain')"></div>

    <main class="center-workspace">
        <div class="chart-region">
            <span style="color:#222; font-weight:900; font-size:12px;">FIELDOS_CHART_V1</span>
        </div>

        <div class="scroll-content">
            <div class="active-instrument-region" id="active-ui">
                <div class="inst-box"></div>
                <div class="inst-header" id="inst-name">INSTRUMENT_NAME</div>
            </div>

            <div class="volume-region">
                <div class="vol-bar" style="height:30%"></div>
                <div class="vol-bar" style="height:60%"></div>
                <div class="vol-bar" style="height:90%"></div>
                <div class="vol-bar" style="height:40%"></div>
                <div class="vol-bar" style="height:80%"></div>
            </div>

            <div class="chooser-region">
                <button class="add-btn" id="trigger-btn" onclick="openChooser()">+ ADD INSTRUMENT</button>
                <div class="chooser-ui" id="chooser-box">
                    <div class="section-label">Quick Access</div>
                    <div class="qa-grid">
                        <div class="qa-item" onclick="setInst('Kinetic Manifold')">KINETIC MANIFOLD</div>
                        <div class="qa-item" onclick="setInst('Compression / Expansion')">COMP / EXP</div>
                        <div class="qa-item" onclick="setInst('Precision / Confidence')">PREC / CONF</div>
                    </div>
                    <div class="section-label">Categories</div>
                    <div class="cat-card" onclick="openCat(this)">
                        <div class="cat-head">1. STRUCTURAL FIELD <span>+</span></div>
                        <div class="cat-body">
                            <div class="inst-link" onclick="setInst('Phase Boundaries')">PHASE BOUNDARIES</div>
                            <div class="inst-link" onclick="setInst('Compression Zones')">COMPRESSION ZONES</div>
                        </div>
                    </div>
                    <div class="cat-card" onclick="openCat(this)">
                        <div class="cat-head">2. FORCE FIELD <span>+</span></div>
                        <div class="cat-body">
                            <div class="inst-link" onclick="setInst('Momentum Vector')">MOMENTUM VECTOR</div>
                            <div class="inst-link" onclick="setInst('Acceleration Gradient')">ACCELERATION GRADIENT</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <nav class="bottom-nav" id="b-nav">
            <div class="nav-tab active">CHART</div>
            <div class="nav-tab">VOL</div>
            <div class="nav-tab" onclick="toggleSide('l-curtain'); toggleSide('r-curtain');">FOCUS</div>
            <div class="nav-tab" onclick="hideNav()">HIDE</div>
        </nav>
    </main>

    <aside class="curtain right" id="r-curtain">
        <div class="curtain-inner">
            <div class="section-label" style="color: var(--cyan);">Workspace</div>
            <div style="flex:1; border:1px dashed #1a1a1a; display:flex; align-items:center; justify-content:center; color:#222; font-size:10px;">EMPTY</div>
            <button class="add-btn" onclick="toggleSide('r-curtain')">CLOSE</button>
        </div>
    </aside>
    <div class="handle handle-right" id="r-handle" onclick="toggleSide('r-curtain')"></div>

</div>

<script>
    function toggleSide(id) {
        const c = document.getElementById(id);
        const h = document.getElementById(id === 'l-curtain' ? 'l-handle' : 'r-handle');
        c.classList.toggle('collapsed');
        h.style.display = c.classList.contains('collapsed') ? 'block' : 'none';
    }

    function hideNav() { document.getElementById('b-nav').classList.add('hidden'); }

    function openChooser() {
        document.getElementById('trigger-btn').style.display = 'none';
        document.getElementById('chooser-box').style.display = 'block';
    }

    function openCat(el) {
        const wasActive = el.classList.contains('active');
        document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('active'));
        if (!wasActive) el.classList.add('active');
    }

    function setInst(name) {
        document.getElementById('chooser-box').style.display = 'none';
        document.getElementById('trigger-btn').style.display = 'block';
        document.getElementById('active-ui').style.display = 'block';
        document.getElementById('inst-name').innerText = name;
        document.querySelector('.scroll-content').scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>

</body>
</html>
