<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>FieldOS / Kinetic</title>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    :root {
      --bg: #000000;
      --panel: #050505;
      --accent: #00e5ff;
      --accent-dim: rgba(0, 229, 255, 0.15);
      --accent-border: rgba(0, 229, 255, 0.4);
      --access: #ffcc00;
      --text-main: #e0e0e0;
      --text-dim: #707070;
      --text-faint: #333333;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      
      --card-compact: 105px;
      --card-expanded: 170px;
    }

    /* BASE RESET */
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { 
      margin: 0; padding: 0; width: 100%; height: 100%; 
      background: var(--bg); color: var(--text-main); 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      overflow: hidden; 
    }

    /* SHELL LAYOUT */
    .app-shell { 
      position: fixed; inset: 0; display: grid; grid-template-rows: 1fr auto; 
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0; 
    }
    .workspace-shell { 
      display: grid; grid-template-columns: auto 1fr auto; 
      min-height: 0; overflow: hidden; position: relative; 
    }

    /* ACCESS ORBS */
    .access-trigger {
      position: absolute; top: 15%; width: 40px; height: 60px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 200;
    }
    .trigger-left { left: 0; }
    .trigger-right { right: 0; }
    .access-orb {
      width: 4px; height: 4px; background: var(--access);
      border-radius: 50%; box-shadow: 0 0 8px var(--access);
      opacity: 0.6; transition: opacity 0.2s;
    }
    .access-trigger:active .access-orb { opacity: 1; transform: scale(1.2); }

    /* CURTAINS */
    .curtain { 
      height: 100%; overflow: hidden; 
      transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1); 
      background: #030303; z-index: 100; 
    }
    .left-curtain { width: 160px; }
    .right-curtain { width: 140px; }
    .curtain.is-collapsed { width: 0 !important; }

    /* CENTER WORKSPACE */
    .center-workspace { 
      position: relative; display: flex; flex-direction: column; 
      overflow-y: auto; background: var(--bg); scrollbar-width: none; 
    }
    .center-workspace::-webkit-scrollbar { display: none; }

    /* CHART ZONE */
    .chart-box { 
      position: sticky; top: 0; z-index: 20; 
      background: var(--bg); width: 100%; height: 42vh;
      border-bottom: 1px solid #111;
    }

    /* INSTRUMENT STACK */
    .middle-stack { 
      display: flex; flex-direction: column; 
      padding: 10px 10px 120px 10px; gap: 8px; 
    }

    /* INSTRUMENT CARDS (SMOKED GLASS SLABS) */
    .stack-card { 
      background: #020202;
      position: relative; overflow: hidden;
      border-radius: 2px;
      box-shadow: 
        0 8px 24px rgba(0,0,0,0.9),
        inset 0 0 0 1px var(--accent-border);
      transition: transform 0.3s, box-shadow 0.3s, background 0.3s;
    }

    .stack-card.is-expanded { 
      background: #040404;
      transform: translateY(-1px);
      box-shadow: 
        0 12px 32px rgba(0,0,0,1),
        inset 0 0 0 1px var(--accent),
        inset 0 0 15px var(--accent-dim);
    }

    .card-visual-area { 
      width: 100%; position: relative; height: var(--card-compact); 
      transition: height 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      /* CLEAN RADIAL SPOTLIGHT */
      background: 
        radial-gradient(circle at 50% 50%, rgba(0, 229, 255, 0.06) 0%, transparent 65%),
        #020202;
    }
    .stack-card.is-expanded .card-visual-area { height: var(--card-expanded); }

    .field-canvas { 
      width: 100%; height: 100%; position: absolute; inset: 0; 
      opacity: 0.7; pointer-events: none; 
    }

    /* HUD ELEMENTS */
    .hud-meta { position: absolute; padding: 12px; z-index: 5; pointer-events: none; font-family: var(--font-mono); text-transform: uppercase; }
    .hud-top-left { top: 0; left: 0; }
    .hud-top-right { top: 0; right: 0; display: flex; align-items: center; gap: 14px; pointer-events: auto; }
    
    .hud-title { font-size: 10px; font-weight: 700; letter-spacing: 1px; color: var(--text-dim); }
    .stack-card.is-expanded .hud-title { color: var(--accent); }
    .hud-category { font-size: 8px; color: var(--text-faint); font-weight: 800; }

    .hud-bottom-left { 
      bottom: 0; left: 0; display: flex; gap: 16px; width: 100%; 
      padding: 30px 12px 10px 12px; 
      background: linear-gradient(0deg, rgba(0, 0, 0, 0.9) 0%, transparent 100%); 
    }
    .readout-item { font-size: 10px; color: var(--accent); opacity: 0.6; }
    .readout-label { color: #444; margin-right: 4px; font-size: 8px; }

    /* GLYPH CONTROLS */
    .glyph { 
      width: 18px; height: 18px; cursor: pointer; color: #333; 
      display: flex; align-items: center; justify-content: center; 
      font-size: 10px; transition: color 0.2s; 
    }
    .glyph:hover { color: var(--accent); }
    .glyph.active { color: var(--accent); }

    /* SLOT MENU (EMBEDDED) */
    .slot-menu-surface {
      position: absolute; inset: 0; background: #010101;
      z-index: 10; display: none; flex-direction: column;
      padding: 16px; justify-content: center; gap: 8px;
    }
    .stack-card.mode-menu .slot-menu-surface { display: flex; }
    .menu-option {
      font-family: var(--font-mono); font-size: 9px; color: #555;
      text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer;
      padding: 10px; border-left: 2px solid transparent; transition: all 0.2s;
    }
    .menu-option:hover { color: var(--accent); border-left-color: var(--accent); background: rgba(0, 229, 255, 0.05); }

    /* BOTTOM UTILITY */
    .bottom-menu-wrap { 
      height: 60px; display: grid; grid-template-columns: repeat(6, 1fr) 44px; 
      background: #020202; z-index: 110; 
      border-top: 1px solid #111;
    }
    .menu-item { 
      background: transparent; border: none; color: #444; 
      font-size: 9px; text-transform: uppercase; font-weight: 700; 
      cursor: pointer; letter-spacing: 1px;
    }
    .menu-item:active { color: var(--accent); }
  </style>
</head>
<body>

<div class="app-shell">
  <div class="workspace-shell">
    
    <div class="access-trigger trigger-left" onclick="toggleCurtain('leftCurtain')">
      <div class="access-orb"></div>
    </div>
    <div class="access-trigger trigger-right" onclick="toggleCurtain('rightCurtain')">
      <div class="access-orb"></div>
    </div>

    <aside class="curtain left-curtain is-collapsed" id="leftCurtain"></aside>

    <main class="center-workspace">
      <section class="chart-box" id="chartContainer"></section>

      <div class="middle-stack">
        
        <section class="stack-card" id="card-asymmetry">
          <div class="card-visual-area">
            <div class="hud-meta hud-top-left"><span class="hud-title">Asymmetry Field</span></div>
            <div class="hud-meta hud-top-right">
              <span class="hud-category">Kinetic</span>
              <div class="glyph" onclick="toggleMode(this, 'menu')">⧉</div>
              <div class="glyph" onclick="toggleMode(this, 'expand')">▿</div>
            </div>
            
            <div class="slot-menu-surface">
              <div class="menu-option">Replace Instrument</div>
              <div class="menu-option">Add Instrument Below</div>
            </div>

            <canvas id="canvas-asymmetry" class="field-canvas"></canvas>
            
            <div class="hud-meta hud-bottom-left">
              <div class="readout-item"><span class="readout-label">BIAS</span><span>0.419</span></div>
              <div class="readout-item"><span class="readout-label">VOL</span><span>0.177</span></div>
            </div>
          </div>
        </section>

        <section class="stack-card" id="card-entropy">
          <div class="card-visual-area">
            <div class="hud-meta hud-top-left"><span class="hud-title">Entropy Phase</span></div>
            <div class="hud-meta hud-top-right">
              <span class="hud-category">Env</span>
              <div class="glyph" onclick="toggleMode(this, 'menu')">⧉</div>
              <div class="glyph" onclick="toggleMode(this, 'expand')">▿</div>
            </div>

            <div class="slot-menu-surface">
              <div class="menu-option">Replace Instrument</div>
              <div class="menu-option">Add Instrument Below</div>
            </div>

            <canvas id="canvas-entropy" class="field-canvas"></canvas>
            
            <div class="hud-meta hud-bottom-left">
              <div class="readout-item"><span class="readout-label">ENTR</span><span>0.884</span></div>
              <div class="readout-item"><span class="readout-label">STAB</span><span>0.116</span></div>
            </div>
          </div>
        </section>

      </div>
    </main>

    <aside class="curtain right-curtain is-collapsed" id="rightCurtain"></aside>
  </div>

  <footer class="bottom-menu-wrap">
    <button class="menu-item">Order</button>
    <button class="menu-item">Flow</button>
    <button class="menu-item">Depth</button>
    <button class="menu-item">Histo</button>
    <button class="menu-item">Alert</button>
    <button class="menu-item">Log</button>
    <button class="menu-item" style="color:#222">▿</button>
  </footer>
</div>

<script>
  // INTERACTION LOGIC
  function toggleCurtain(id) {
    document.getElementById(id).classList.toggle('is-collapsed');
  }

  function toggleMode(el, mode) {
    const card = el.closest('.stack-card');
    
    if (mode === 'expand') {
      const isExpanded = card.classList.contains('is-expanded');
      // Single-expand rule
      document.querySelectorAll('.stack-card').forEach(c => c.classList.remove('is-expanded'));
      if (!isExpanded) card.classList.add('is-expanded');
    } 
    else if (mode === 'menu') {
      // Toggle menu independently (Multi-menu allowed)
      card.classList.toggle('mode-menu');
    }
  }

  // CHART IMPLEMENTATION
  const chart = LightweightCharts.createChart(document.getElementById('chartContainer'), {
    layout: { background: { color: '#000' }, textColor: '#444', fontFamily: 'JetBrains Mono' },
    grid: { vertLines: { color: '#050505' }, horzLines: { color: '#050505' } },
    timeScale: { borderColor: '#111', timeVisible: true },
    crosshair: { vertLine: { color: 'rgba(0, 229, 255, 0.1)' }, horzLine: { color: 'rgba(0, 229, 255, 0.1)' } },
    handleScroll: true,
    handleScale: true,
  });
  
  const candleSeries = chart.addCandlestickSeries({ 
    upColor: '#00e5ff', downColor: '#000000', 
    borderVisible: true, borderUpColor: '#00e5ff', borderDownColor: '#00e5ff',
    wickUpColor: '#00e5ff', wickDownColor: '#00e5ff' 
  });

  const mockData = Array.from({length: 120}, (_, i) => ({
    time: (Date.now() / 1000) - (120 - i) * 3600,
    open: 50000 + (Math.random() * 200),
    high: 50300 + (Math.random() * 200),
    low: 49800 - (Math.random() * 200),
    close: 50100 + (Math.random() * 200)
  }));
  candleSeries.setData(mockData);

  // FIELD CANVAS ANIMATION
  function paintField(id) {
    const canvas = document.getElementById(id);
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    
    if (canvas.width !== rect.width * dpr) {
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.scale(dpr, dpr);
    }
    
    ctx.clearRect(0, 0, rect.width, rect.height);
    ctx.beginPath();
    ctx.strokeStyle = '#00e5ff';
    ctx.lineWidth = 0.5;
    ctx.globalAlpha = 0.15;
    
    const time = Date.now() * 0.001;
    const spacing = 14;
    
    for(let x = 0; x < rect.width; x += spacing) {
      ctx.moveTo(x, rect.height * 0.8);
      let yOffset = Math.sin(x * 0.02 + time) * 15;
      ctx.lineTo(x + Math.cos(time) * 5, (rect.height * 0.7) + yOffset);
    }
    ctx.stroke();
  }

  function loop() {
    paintField('canvas-asymmetry');
    paintField('canvas-entropy');
    requestAnimationFrame(loop);
  }
  
  loop();

  // Resize handling
  window.addEventListener('resize', () => {
    chart.applyOptions({ width: document.getElementById('chartContainer').clientWidth });
  });
</script>

</body>
</html>
