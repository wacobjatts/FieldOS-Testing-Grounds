<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>FieldOS / Kinetic - Absorption Tension Review</title>
  <style>
    /* GLOBAL STYLES - PRESERVED FROM SHELL */
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000000; color: #e8e8e8; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    .app-shell { position: fixed; inset: 0; display: grid; grid-template-rows: 1fr auto; padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 10px; }
    .workspace-shell { display: grid; grid-template-columns: auto 1fr auto; gap: 10px; min-height: 0; overflow: hidden; }

    /* CURTAINS */
    .curtain { height: 100%; overflow: hidden; transition: width 0.2s ease; display: flex; }
    .left-curtain { width: 130px; }
    .right-curtain { width: 120px; }
    .curtain.is-collapsed { width: 20px !important; }

    .curtain-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 8px; background: #050505; }
    .curtain.is-collapsed .curtain-content { display: none; }
    .curtain-handle { width: 20px; background: #0a0a0a; color: #e8e8e8; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; border: none; }

    /* TICKER / WATCHLIST */
    .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .panel-title { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #666; margin: 0; }
    .list-selector { display: flex; gap: 4px; overflow-x: auto; margin-bottom: 10px; scrollbar-width: none; }
    .list-tab { background: transparent; border: none; color: #666; font-size: 9px; padding: 3px 6px; cursor: pointer; white-space: nowrap; }
    .list-tab.is-active { color: #00ffff; }

    .ticker-search { width: 100%; background: #111; border: none; color: #fff; padding: 6px; margin-bottom: 10px; font-size: 11px; outline: none; }
    .ticker-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
    .ticker-row { display: grid; grid-template-columns: 1fr auto; padding: 6px; cursor: pointer; font-size: 10px; background: #0a0a0a; }
    .ticker-row.is-active { background: #001515; color: #00ffff; }
    .t-price { color: #00ff00; text-align: right; }
    .t-delta { font-size: 8px; color: #666; display: block; }

    /* CENTER WORKSPACE */
    .center-workspace { display: flex; flex-direction: column; overflow-y: auto; gap: 6px; scrollbar-width: none; }
    .center-workspace::-webkit-scrollbar { display: none; }
    
    /* CHART BOX */
    .chart-box { position: sticky; top: 0; z-index: 20; background: #000; width: 100%; aspect-ratio: 1.1 / 1; border: none; display: flex; align-items: center; justify-content: center; font-weight: bold; }

    /* MIDDLE STACK */
    .middle-stack { display: flex; flex-direction: column; gap: 6px; }
    
    /* ABSORPTION TENSION CARD STYLING */
    .stack-card { border: none; background: #000; display: flex; flex-direction: column; border-bottom: 1px solid #111; }
    .card-header { padding: 8px 6px; display: flex; justify-content: space-between; align-items: center; background: #000; }
    .card-title { font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin: 0; color: #ccc; }
    .card-category { font-size: 9px; color: #444; text-transform: uppercase; }
    
    .card-visual-area { background: #050505; height: 100px; width: 100%; position: relative; overflow: hidden; }
    .card-readout { display: flex; gap: 12px; padding: 4px 6px; background: #000; border-top: 1px solid #0a0a0a; }
    .readout-item { font-size: 10px; font-family: monospace; color: #00ffff; }
    .readout-label { color: #444; margin-right: 4px; }

    /* CHOOSER / MODULES - PRESERVED */
    .chooser-panel { border: none; display: flex; flex-direction: column; background: #050505; }
    .chooser-top-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px; background: #111; }
    .chooser-section-label { font-size: 9px; color: #444; text-transform: uppercase; padding: 10px 10px 4px 10px; letter-spacing: 1px; font-weight: bold; }
    .ghost-btn { background: #0a0a0a; border: none; color: #fff; padding: 4px 8px; font-size: 10px; cursor: pointer; }
    .icon-btn { background: transparent; border: none; color: #fff; width: 22px; height: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    /* BOTTOM MENU - PRESERVED */
    .bottom-menu-wrap { border: none; height: 54px; display: grid; grid-template-columns: repeat(6, 1fr) 40px; background: #000; }
    .menu-item { background: transparent; border: none; color: #fff; font-size: 8px; text-transform: uppercase; cursor: pointer; }
    .reopen-menu { position: fixed; bottom: 10px; right: 10px; background: #000; border: none; color: #fff; padding: 6px 10px; font-size: 10px; z-index: 100; display: none; border-radius: 2px; }
    .is-hidden { display: none !important; }
  </style>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>

<div class="app-shell">
  <div class="workspace-shell">
    
    <aside class="curtain left-curtain" id="leftCurtain">
      <div class="curtain-content">
        <div class="panel-header"><span class="panel-title">Watchlists</span><button class="icon-btn">+</button></div>
        <div class="list-selector" id="listSelector">
          <button class="list-tab is-active">Main</button>
          <button class="list-tab">Tech</button>
          <button class="list-tab">Alts</button>
        </div>
        <input type="text" class="ticker-search" placeholder="Find symbol...">
        <div class="ticker-list" id="tickerList"></div>
      </div>
      <button class="curtain-handle" onclick="toggleCurtain('leftCurtain')">‹</button>
    </aside>

    <main class="center-workspace">
      <section class="chart-box">
        <div id="chartContainer" style="width:100%;height:100%;"></div>
      </section>

      <div class="middle-stack" id="middleStack">
        <section class="stack-card" id="card-absorption-tension">
          <div class="card-header">
            <h3 class="card-title">Absorption Tension</h3>
            <span class="card-category">Tension</span>
          </div>
          
          <div class="card-visual-area">
            <canvas id="canvas-tension" style="width:100%; height:100%;"></canvas>
          </div>

          <div class="card-readout">
            <div class="readout-item"><span class="readout-label">TENSION</span><span id="val-tension">0</span></div>
            <div class="readout-item"><span class="readout-label">LOADING</span><span id="val-loading">0</span></div>
            <div class="readout-item"><span class="readout-label">SATURATION</span><span id="val-saturation">0</span></div>
          </div>
        </section>
      </div>

      <section class="instrument-chooser-area">
        <button class="ghost-btn" id="addInstrBtn" style="margin: 20px auto; display: block; padding: 10px 20px;">+ Add Tool</button>
      </section>
    </main>

    <aside class="curtain right-curtain" id="rightCurtain">
      <button class="curtain-handle" onclick="toggleCurtain('rightCurtain')">›</button>
      <div class="curtain-content">
        <div class="panel-header"><span class="panel-title">Info</span><button class="icon-btn">+</button></div>
        <div style="flex:1; display:flex; align-items:center; justify-content:center; color:#444; font-size:10px;">Workspace Empty</div>
      </div>
    </aside>
  </div>

  <footer class="bottom-menu-wrap" id="bottomMenu">
    <button class="menu-item">Volume</button>
    <button class="menu-item">Chart</button>
    <button class="menu-item">Instr</button>
    <button class="menu-item">Book</button>
    <button class="menu-item">Sig</button>
    <button class="menu-item">News</button>
    <button class="menu-item" style="color:#666;" onclick="toggleBottomMenu(false)">⌄</button>
  </footer>
</div>

<button class="reopen-menu" id="reopenMenu" onclick="toggleBottomMenu(true)">OPEN MENU</button>

<script>
  /**
   * REPRODUCED LOGIC: tension-field-painter.ts
   * This function follows the visual source of truth provided in the file content.
   */
  function paintTensionField(ctx, points) {
    const width = ctx.canvas.width;
    const height = ctx.canvas.height;
    const baselineY = height * 0.92;
    const maxAmplitude = height * 0.8;

    if (points.length < 2) return;
    const stepX = width / (points.length - 1);

    ctx.save();
    ctx.clearRect(0, 0, width, height);

    // 1. Baseline
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
    ctx.lineWidth = 1;
    ctx.moveTo(0, baselineY);
    ctx.lineTo(width, baselineY);
    ctx.stroke();

    // 2. Surface Mass
    for (let i = 0; i < points.length - 1; i++) {
      const x1 = width - i * stepX;
      const x2 = width - (i + 1) * stepX;
      const p1 = points[i];
      const p2 = points[i + 1];
      const y1 = baselineY - (p1.tension / 100) * maxAmplitude;
      const y2 = baselineY - (p2.tension / 100) * maxAmplitude;
      const avgPrec = (p1.precision + p2.precision) / 2;
      const avgLoad = (p1.loading + p2.loading) / 200;

      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.lineTo(x2, baselineY);
      ctx.lineTo(x1, baselineY);
      ctx.closePath();
      ctx.fillStyle = `rgba(0, 200, 255, ${0.03 * avgLoad * avgPrec})`;
      ctx.fill();
    }

    // 3. Tension Line
    for (let i = 0; i < points.length - 1; i++) {
      const p1 = points[i];
      const p2 = points[i + 1];
      const x1 = width - i * stepX;
      const x2 = width - (i + 1) * stepX;
      const y1 = baselineY - (p1.tension / 100) * maxAmplitude;
      const y2 = baselineY - (p2.tension / 100) * maxAmplitude;
      const avgLoading = (p1.loading + p2.loading) / 200;
      const avgSaturation = (p1.saturation + p2.saturation) / 200;
      const avgPrecision = (p1.precision + p2.precision) / 2;

      ctx.beginPath();
      ctx.lineWidth = (1 + avgLoading * 5) * avgPrecision;
      const glowStrength = avgSaturation * 12 * avgPrecision;
      ctx.shadowBlur = glowStrength;
      ctx.shadowColor = `rgba(180, 240, 255, ${avgSaturation * 0.7})`;
      
      const b = 255;
      const g = Math.floor(180 + avgSaturation * 75);
      const r = Math.floor(100 + avgSaturation * 155);
      ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${0.3 + avgPrecision * 0.7})`;

      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.shadowColor = 'transparent';
    }
    ctx.restore();
  }

  // --- ENGINE / MOCK INTEGRATION ---
  
  function updateAbsorptionTension() {
    const canvas = document.getElementById('canvas-tension');
    if (!canvas) return;
    
    // Resize canvas for sharp rendering
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    /**
     * REVIEW PREVIEW VALUES
     * Logic derived from buildAbsorptionTension in tension.ts
     */
    const mockPoints = [];
    const now = Date.now();
    for (let i = 0; i < 40; i++) {
      // Simulate historical signal decay
      const timeOffset = i * 0.1;
      const mockSignal = Math.sin((now / 1000) - timeOffset) * 40 + 50;
      const precision = 0.9;
      
      const norm = Math.max(0, Math.min(1, Math.abs(mockSignal) / 100));
      const tension = norm * precision;
      const loading = Math.min(1, tension * 1.1);
      const saturation = Math.max(0, loading - 0.2);

      mockPoints.push({
        tension: tension * 100,
        loading: loading * 100,
        saturation: saturation * 100,
        precision
      });
    }

    // Render visual
    paintTensionField(ctx, mockPoints);

    // Render Numerics (Source of Truth: tension.ts field names)
    // Rule: Show 0-100 scale
    const live = mockPoints[0];
    document.getElementById('val-tension').innerText = Math.round(live.tension);
    document.getElementById('val-loading').innerText = Math.round(live.loading);
    document.getElementById('val-saturation').innerText = Math.round(live.saturation);
  }

  /* UTILS & CHART INIT - PRESERVED */
  function toggleCurtain(id) {
    document.getElementById(id).classList.toggle('is-collapsed');
  }
  
  function toggleBottomMenu(show) {
    document.getElementById('bottomMenu').classList.toggle('is-hidden', !show);
    document.getElementById('reopenMenu').style.display = show ? 'none' : 'block';
  }

  const mainChart = LightweightCharts.createChart(document.getElementById('chartContainer'), {
    layout: { background: { type: LightweightCharts.ColorType.Solid, color: '#000000' }, textColor: '#ccc' },
    grid: { vertLines: { color: '#111' }, horzLines: { color: '#111' } },
    rightPriceScale: { borderColor: '#222' },
    timeScale: { borderColor: '#222' }
  });
  const candleSeries = mainChart.addCandlestickSeries({ upColor: '#00ffff', downColor: '#ff0055', borderVisible: false });
  candleSeries.setData([
    { time: '2024-04-01', open: 150, high: 155, low: 148, close: 153 },
    { time: '2024-04-02', open: 153, high: 158, low: 152, close: 157 },
    { time: '2024-04-03', open: 157, high: 157, low: 151, close: 152 },
    { time: '2024-04-04', open: 152, high: 156, low: 150, close: 154 },
    { time: '2024-04-05', open: 154, high: 160, low: 154, close: 159 },
  ]);

  // Start Animation Loop for Instrument Review
  function loop() {
    updateAbsorptionTension();
    requestAnimationFrame(loop);
  }
  loop();

  // Handle Resize
  window.addEventListener('resize', () => {
    const rect = document.getElementById('chartContainer').getBoundingClientRect();
    mainChart.resize(rect.width, rect.height);
  });
</script>

</body>
</html>
