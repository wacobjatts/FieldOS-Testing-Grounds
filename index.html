<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FIELD-OS // KINETIC</title>
    <script type="importmap">
      { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cockpit-frame">
        <div id="accretion-canvas-container"></div>

        <aside class="tactical-stack">
            <div class="instrument-label">PRESSURE MANIFOLD</div>
            <div class="manifold-container">
                <div id="manifold-buy" class="chamber buy"></div>
                <div id="manifold-sell" class="chamber sell"></div>
                <div id="price-blade"></div>
                <div class="etching-overlay"></div>
            </div>
            <div class="precision-readout">
                INTEGRITY: <span id="precision-percent">100%</span>
            </div>
        </aside>

        <div class="hud-layer">
            <header>
                <div class="brand">FIELD-OS // KINETIC</div>
                <div class="status">SYSTEM: NOMINAL</div>
            </header>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
