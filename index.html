<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>FieldOS iPhone Shell</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
      color: #e8e8e8;
      overflow: hidden;
    }

    body {
      position: fixed;
      inset: 0;
    }

    .app {
      position: fixed;
      inset: 0;
      background: #000;
      display: grid;
      grid-template-rows: 1fr 64px;
      gap: 10px;
      padding:
        calc(env(safe-area-inset-top) + 10px)
        10px
        calc(env(safe-area-inset-bottom) + 10px)
        10px;
    }

    .workspace {
      min-height: 0;
      min-width: 0;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 10px;
      align-items: stretch;
    }

    /* LEFT CURTAIN */
    .left-panel {
      width: 88px;
      min-width: 88px;
      transition: width 0.22s ease;
      overflow: hidden;
    }

    .left-panel.collapsed {
      width: 18px;
      min-width: 18px;
    }

    .left-shell {
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 18px;
    }

    .left-panel.collapsed .left-shell {
      grid-template-columns: 0 18px;
    }

    .left-content {
      border: 1px solid #3a3a3a;
      overflow: hidden;
      padding: 10px 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .left-panel.collapsed .left-content {
      border: 0;
      padding: 0;
    }

    .curtain-handle {
      border: 1px solid #3a3a3a;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      font-size: 13px;
      font-weight: 700;
      color: #d8d8d8;
      background: #000;
    }

    /* CENTER */
    .center {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 44vh) 46px minmax(0, 1fr);
      gap: 10px;
    }

    .chart-wrap {
      min-width: 0;
      min-height: 0;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .chart-box {
      width: 100%;
      max-width: 100%;
      height: 100%;
      border: 1px solid #3a3a3a;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      aspect-ratio: 1.08 / 1;
      padding: 12px;
    }

    .volume-box {
      border: 1px solid #3a3a3a;
      display: flex;
      align-items: center;
      padding: 0 10px;
    }

    .instrument-panel {
      min-height: 0;
      border: 1px solid #3a3a3a;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
      transition: grid-template-rows 0.22s ease;
    }

    .instrument-panel.collapsed {
      grid-template-rows: auto 0fr;
    }

    .instrument-header {
      padding: 10px;
      border-bottom: 1px solid #3a3a3a;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: start;
    }

    .instrument-panel.collapsed .instrument-header {
      border-bottom: 0;
    }

    .instrument-title-wrap {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .instrument-toggle {
      border: 1px solid #3a3a3a;
      background: transparent;
      color: #e8e8e8;
      padding: 6px 10px;
      font-size: 13px;
      cursor: pointer;
      height: 38px;
    }

    .instrument-body {
      min-height: 0;
      overflow: auto;
      padding: 10px;
    }

    .instrument-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .instrument-card {
      min-height: 84px;
      border: 1px solid #3a3a3a;
      background: transparent;
      color: #e8e8e8;
      padding: 12px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      text-align: left;
      cursor: pointer;
    }

    /* RIGHT CURTAIN */
    .right-panel {
      width: 96px;
      min-width: 96px;
      transition: width 0.22s ease;
      overflow: hidden;
    }

    .right-panel.collapsed {
      width: 18px;
      min-width: 18px;
    }

    .right-shell {
      height: 100%;
      display: grid;
      grid-template-columns: 18px 1fr;
    }

    .right-panel.collapsed .right-shell {
      grid-template-columns: 18px 0;
    }

    .right-content {
      border: 1px solid #3a3a3a;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }

    .right-panel.collapsed .right-content {
      border: 0;
    }

    .right-topbar {
      padding: 8px;
      border-bottom: 1px solid #3a3a3a;
      display: flex;
      justify-content: flex-end;
    }

    .module-add-icon {
      width: 30px;
      height: 30px;
      border: 1px solid #3a3a3a;
      background: transparent;
      color: #e8e8e8;
      font-size: 18px;
      cursor: pointer;
    }

    .right-empty {
      min-height: 0;
      padding: 10px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-align: center;
      overflow: hidden;
    }

    .add-module-btn {
      border: 1px solid #3a3a3a;
      background: transparent;
      color: #e8e8e8;
      padding: 8px 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      font-size: 13px;
      width: 100%;
    }

    /* PAGE BAR */
    .page-bar {
      min-height: 0;
      border: 1px solid #3a3a3a;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      overflow: hidden;
    }

    .page-tab {
      border: 0;
      border-right: 1px solid #3a3a3a;
      background: transparent;
      color: #e8e8e8;
      font-size: 12px;
      cursor: pointer;
      padding: 0;
    }

    .page-tab:last-child {
      border-right: 0;
    }

    .page-tab.active {
      font-weight: 700;
    }

    /* TEXT */
    h1, h2, p {
      margin: 0;
    }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.15;
    }

    .section-subtitle {
      font-size: 12px;
      line-height: 1.3;
      color: #b5b5b5;
    }

    .small-label {
      font-size: 14px;
      font-weight: 700;
    }

    .card-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.1;
    }

    .card-text {
      font-size: 12px;
      line-height: 1.3;
      color: #b5b5b5;
    }

    /* Slightly larger phones */
    @media (min-width: 430px) {
      .left-panel {
        width: 96px;
        min-width: 96px;
      }

      .right-panel {
        width: 108px;
        min-width: 108px;
      }

      .center {
        grid-template-rows: minmax(0, 46vh) 50px minmax(0, 1fr);
      }

      .chart-box {
        aspect-ratio: 1.12 / 1;
      }

      .instrument-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="workspace">
      <aside class="left-panel" id="leftPanel">
        <div class="left-shell">
          <div class="left-content">
            <h2 class="section-title">Tickers</h2>
          </div>
          <div class="curtain-handle" id="leftHandle">‹</div>
        </div>
      </aside>

      <main class="center">
        <section class="chart-wrap">
          <div class="chart-box">
            <h1 class="section-title">Chart Area</h1>
          </div>
        </section>

        <section class="volume-box">
          <h2 class="small-label">Volume</h2>
        </section>

        <section class="instrument-panel" id="instrumentPanel">
          <div class="instrument-header">
            <div class="instrument-title-wrap">
              <h2 class="section-title">FieldOS Instruments</h2>
              <p class="section-subtitle">Choose a category to open instruments</p>
            </div>
            <button class="instrument-toggle" id="instrumentToggle" type="button">Hide</button>
          </div>

          <div class="instrument-body">
            <div class="instrument-grid">
              <button class="instrument-card" type="button">
                <span class="card-title">Flow</span>
                <span class="card-text">Order book pressure, absorption</span>
              </button>
              <button class="instrument-card" type="button">
                <span class="card-title">Momentum</span>
                <span class="card-text">Impulse, continuation, decay behavior</span>
              </button>
              <button class="instrument-card" type="button">
                <span class="card-title">Structure</span>
                <span class="card-text">Anchors, levels, compression zones</span>
              </button>
              <button class="instrument-card" type="button">
                <span class="card-title">Volatility</span>
                <span class="card-text">Turbulence, range expansion</span>
              </button>
              <button class="instrument-card" type="button">
                <span class="card-title">Signal</span>
                <span class="card-text">Confirmation, divergence</span>
              </button>
              <button class="instrument-card" type="button">
                <span class="card-title">Custom</span>
                <span class="card-text">Saved user instruments</span>
              </button>
            </div>
          </div>
        </section>
      </main>

      <aside class="right-panel" id="rightPanel">
        <div class="right-shell">
          <div class="curtain-handle" id="rightHandle">›</div>
          <div class="right-content">
            <div class="right-topbar">
              <button class="module-add-icon" type="button">+</button>
            </div>
            <div class="right-empty">
              <h2 class="section-title">Info</h2>
              <p class="section-subtitle">Add market tools, notes, or live context</p>
              <button class="add-module-btn" type="button">
                <span>+</span>
                <span>Add</span>
              </button>
            </div>
          </div>
        </div>
      </aside>
    </div>

    <nav class="page-bar">
      <button class="page-tab active" type="button">Chart</button>
      <button class="page-tab" type="button">Volume</button>
      <button class="page-tab" type="button">Instruments</button>
      <button class="page-tab" type="button">Order Book</button>
      <button class="page-tab" type="button">Signals</button>
      <button class="page-tab" type="button">News</button>
    </nav>
  </div>

  <script>
    const leftPanel = document.getElementById("leftPanel");
    const rightPanel = document.getElementById("rightPanel");
    const leftHandle = document.getElementById("leftHandle");
    const rightHandle = document.getElementById("rightHandle");
    const instrumentPanel = document.getElementById("instrumentPanel");
    const instrumentToggle = document.getElementById("instrumentToggle");

    leftHandle.addEventListener("click", () => {
      leftPanel.classList.toggle("collapsed");
      leftHandle.textContent = leftPanel.classList.contains("collapsed") ? "›" : "‹";
    });

    rightHandle.addEventListener("click", () => {
      rightPanel.classList.toggle("collapsed");
      rightHandle.textContent = rightPanel.classList.contains("collapsed") ? "‹" : "›";
    });

    instrumentToggle.addEventListener("click", () => {
      instrumentPanel.classList.toggle("collapsed");
      instrumentToggle.textContent = instrumentPanel.classList.contains("collapsed") ? "Show" : "Hide";
    });
  </script>
</body>
</html>
