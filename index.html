<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FieldOS / Kinetic</title>
    <style>
        /* STRICT CONTRACT: #000000, NO FRAMEWORKS, IPHONE-FIRST */
        :root {
            --bg: #000000;
            --panel: #0a0a0a;
            --border: #1a1a1a;
            --cyan: #00ffff;
            --nav-h: 70px;
            --curtain-w: 260px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; background: var(--bg); color: #fff;
            font-family: -apple-system, system-ui, sans-serif;
            height: 100%; width: 100%; overflow: hidden; position: fixed;
        }

        /* THE APP SHELL - LOCKS TO IPHONE SCREEN */
        .app-shell {
            display: flex;
            width: 100vw;
            height: 100vh;
            position: relative;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* CURTAIN SYSTEM - SIDEWAYS COLLAPSE */
        .curtain {
            height: 100%;
            width: var(--curtain-w);
            background: var(--panel);
            border-right: 1px solid var(--border);
            transition: transform 0.2s ease, width 0.2s ease;
            flex-shrink: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .curtain.right { border-right: none; border-left: 1px solid var(--border); }
        .curtain.collapsed { width: 0; border: none; }

        .curtain-inner { width: var(--curtain-w); height: 100%; padding: 20px; display: flex; flex-direction: column; }
        
        /* HANDLES */
        .handle {
            position: absolute; top: 40%; width: 12px; height: 100px; 
            background: var(--border); z-index: 101; cursor: pointer; display: none;
        }
        .handle-left { left: 0; border-radius: 0 4px 4px 0; }
        .handle-right { right: 0; border-radius: 4px 0 0 4px; }

        /* CENTER WORKSPACE - THE CORE STACK */
        .center-workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden; /* Contains the scroll inside */
            position: relative;
        }

        /* 1. CHART - STICKY/FIXED AT TOP */
        .chart-region {
            flex-shrink: 0;
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #050505;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* SCROLLABLE AREA STARTING FROM ACTIVE INSTRUMENT */
        .scroll-content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: var(--nav-h);
        }

        /* 2. ACTIVE INSTRUMENT */
        .active-instrument-region { padding: 10px; border-bottom: 1px solid var(--border); display: none; }
        .inst-box { width: 100%; height: 160px; background: #080808; border: 1px solid var(--border); margin-bottom: 6px; }
        .inst-header { font-size: 11px; font-weight: 900; color: var(--cyan); text-transform: uppercase; }

        /* 3. VOLUME */
        .volume-region { width: 100%; height: 60px; padding: 10px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-end; gap: 2px; }
        .vol-bar { flex: 1; background: #333; min-height: 2px; }

        /* 4. INSTRUMENT CHOOSER */
        .chooser-region { padding: 20px; }
        .add-btn { background: none; border: 1px solid var(--border); color: #666; width: 100%; padding: 15px; border-radius: 4px; font-size: 13px; font-weight: 700; }
        
        .chooser-ui { display: none; margin-top: 20px; }
        .section-label { font-size: 10px; color: #444; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        .qa-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 25px; }
